name: Web E2E (PR)

# Runs the @web Playwright suite (auth + landing â€” 12 tests today) against
# production (`decentraland.org`) on every PR that touches `web/**`.
#
# We target `.org` rather than the dev `.zone` / `.today` hosts because both
# sit behind multiple Cloudflare Access applications with scoped service-token
# policies â€” the token covers `/auth/*` but not `/`, `/marketplace`, etc., so
# any spec that navigates outside `/auth/*` gets bounced to a CF login wall.
# Until that's resolved at the infra level, `.org` is the only host that
# gives reliable, full-suite PR signal. The manual workflow still has the
# `org` / `zone` / `today` toggle for ad-hoc runs once CF Access is sorted.
#
# Marketplace specs are deliberately out of scope â€” they're a different dapp
# surface; the on-chain bucket needs a 1-worker pool and costs testnet funds.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Trigger on changes that can affect test behavior: spec/POM/helper code
    # under `web/tests/` + `web/shared/`, dependency manifests, the playwright
    # and tsconfig configs, and this workflow itself. Pure-docs / pure-format
    # files under `web/` are excluded â€” they can't make a test pass or fail.
    # GitHub evaluates these patterns in order; later patterns override earlier
    # ones, so the `!` exclusions subtract from the `web/**` match.
    paths:
      - 'web/**'
      - '!web/README.md'
      - '!web/CLAUDE.md'
      - '!web/.prettierrc'
      - '!web/.prettierignore'
      - '!web/.eslintrc.cjs'
      - '.github/workflows/web-e2e-pr.yml'

# Cancel an older in-progress run when a new commit lands on the same PR
# branch. Saves CI minutes during rapid push cycles.
concurrency:
  group: web-e2e-pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  web:
    # Drafts skip CI to save minutes â€” flip the PR to "Ready for review" to trigger.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          # Fall back to any prior `pw-<os>-â€¦` cache if the lockfile-derived
          # key is a miss (lockfile bumped without changing Playwright). The
          # `playwright install` step still runs to bring in any missing
          # browsers, but starting from a warm cache saves a few minutes.
          restore-keys: |
            pw-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env from secrets / variables
        # web/shared/helpers/env.ts loads `.env` from the repo root.
        # CF Access creds are forwarded so the headers ride on every request
        # via playwright.config.ts's `use.extraHTTPHeaders`. On .org (where
        # this workflow runs) the host isn't gated and the headers are a
        # no-op, but keeping them populated means any test that does navigate
        # to a CF-gated origin (e.g. an api.decentraland.zone subdomain) is
        # already authorized â€” and the wiring matches the manual workflow.
        #
        # Non-sensitive values (host, port, sender filter, mailbox address)
        # may be configured under repo Settings â†’ Secrets and variables â†’ Actions
        # in either the Secrets *or* Variables tab â€” `vars.X || secrets.X`
        # picks whichever is set. Variables are plaintext and accessible to
        # fork PRs; secrets are encrypted but blocked on fork PRs.
        # IMAP_PASSWORD and CF Access tokens must be Secrets.
        working-directory: ${{ github.workspace }}
        run: |
          cat > .env <<'EOF'
          IMAP_HOST=${{ vars.IMAP_HOST || secrets.IMAP_HOST }}
          IMAP_PORT=${{ vars.IMAP_PORT || secrets.IMAP_PORT }}
          IMAP_USER=${{ vars.IMAP_USER || secrets.IMAP_USER }}
          IMAP_PASSWORD=${{ secrets.IMAP_PASSWORD }}
          OTP_FROM_EMAIL=${{ vars.OTP_FROM_EMAIL || secrets.OTP_FROM_EMAIL }}
          CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

      - name: Run Playwright (--project=web on .org)
        env:
          WEB_BASE_URL: https://decentraland.org
          BASE_URL: https://decentraland.org
        run: npx playwright test --project=web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: |
            web/playwright-report/**
            web/test-results/**
            web/allure-results/**
          if-no-files-found: warn
