name: Runtime Perf Probe (Windows)

# Thin wrapper around runner-validation-windows.yml that pins perf-specific
# defaults: an instrumented Explorer build (unity-explorer PR #8814) plus a
# test filter that picks exactly two canaries — Track A (AutoPilot subprocess
# fixture) and Track B (InWorld fixture that exercises the new
# PerformanceAnalyticsSystem JSON sink via BaseTest's per-fixture attach
# hook).
#
# What it verifies in one run:
#   - Track A — AutoPilotCanaryTest.StandAtSpawn_90s spawns Decentraland.exe
#     with `--autopilot --csv --summary`, asserts the eight-field summary,
#     attaches CSV + summary to Allure.
#   - Track B — TestSearchAndEquipFistPump (lowest-CV InWorld fixture per
#     explorer/scripts/perf/baseline_report.md) runs through AltTester. The
#     Explorer carries `--alttester`, which enables PR #8814's file sink;
#     BaseTest.OneTimeTearDown attaches the per-fixture perf-payloads.jsonl
#     slice.
#
# KNOWN RISK — AutoPilot spawns a SECOND Decentraland.exe while the chassis
# Explorer is still up under AltTester. NUnit serialises tests within a
# fixture, but the chassis Explorer process stays alive across the whole
# `mf explorer test` invocation. If the two processes contend for
# auth-token-bridge or GPU resources and Track A times out before
# LoadingStatus.Completed, the workflow still validates Track B end-to-end
# and we split into two sequential test invocations in a follow-up PR.

on:
  workflow_dispatch:
    inputs:
      build_url:
        description: 'Direct URL to an instrumented Decentraland_windows64.zip. Default = unity-explorer PR #8814 prev green build (pr-22379-1c5388e).'
        type: string
        required: false
        default: 'https://explorer-artifacts.decentraland.org/@dcl/unity-explorer/branch/feat/test-automation/alttester-performance-instrumentation/pr-22379-1c5388e/Decentraland_windows64.zip'
      test_filter:
        description: 'NUnit --filter expression. Default catches Track A (AutoPilotCanaryTest) + Track B (TestSearchAndEquipFistPump).'
        type: string
        required: false
        default: 'FullyQualifiedName~AutoPilotCanaryTest|FullyQualifiedName~TestSearchAndEquipFistPump'

  # Auto-fire on every push that touches the perf surface area on this
  # branch — keeps the probe in lockstep with PR review iterations on
  # explorer-automation#12 without manual dispatch.
  push:
    branches: [feat/win-gpu-test-runner-workflow]
    paths:
      - '.github/workflows/runtime-perf-probe.yml'
      - 'explorer/Tests/Tests/Performance/**'
      - 'explorer/Tests/Tests/BaseTest.cs'
      - 'explorer/scripts/perf/**'

permissions:
  contents: read
  pull-requests: write

# Don't race the general InWorld validation that lives next door — they
# both want the same T4 runner. Different concurrency group than the
# chassis so a perf-probe re-trigger doesn't cancel an in-flight InWorld
# run (and vice versa).
concurrency:
  group: runtime-perf-probe
  cancel-in-progress: false

jobs:
  probe:
    name: Runtime perf probe
    uses: ./.github/workflows/runner-validation-windows.yml
    with:
      build_url: ${{ inputs.build_url || 'https://explorer-artifacts.decentraland.org/@dcl/unity-explorer/branch/feat/test-automation/alttester-performance-instrumentation/pr-22379-1c5388e/Decentraland_windows64.zip' }}
      test_filter: ${{ inputs.test_filter || 'FullyQualifiedName~AutoPilotCanaryTest|FullyQualifiedName~TestSearchAndEquipFistPump' }}
      dry_run: false
    secrets: inherit
