name: Generate Baselines

# Slash-command-driven baseline regenerator. Dispatches into the reusable
# run-visual-suite workflow, which records baselines and commits them back
# to the PR branch.
#
# Why server-side recording instead of local? CI runs on a deterministic
# macOS runner image; local dev machines can produce subtly different pixels
# due to GPU, font subpixel hinting, color profile, etc. Pinning baselines
# to runner-rendered images keeps the test suite stable.
#
# Grammar:
#   /generate-baselines                              → record every baseline (default mode)
#   /generate-baselines --bootstrap                  → only record baselines that are missing today
#   /generate-baselines --filter Category=Visual&... → restrict to matching tests
#   /generate-baselines --bootstrap --filter ...     → both flags
#
# Restricted to OWNER / MEMBER / COLLABORATOR — anyone else's comment is
# silently ignored.
#
# Build URL resolution:
#   Baselines are pixel-sensitive to which Explorer build rendered them, so
#   choosing the right build matters. Resolution order:
#     1. If the explorer-automation PR's head branch matches an open
#        unity-explorer PR's head branch, use *that* PR's latest successful
#        Unity Cloud Build. Pairs explorer + tests under coordinated change.
#     2. Otherwise, fall back to unity-explorer's latest non-prerelease
#        GitHub release zip. Stable target for routine baseline updates.
#
# Required secrets / vars (configure once on the repo):
#   - secrets.ALTTESTER_LICENSE                       AltTester Pro license key
#   - secrets.REPOS_READ_ONLY_TOKEN                   PAT with read on decentraland/MetaForge + decentraland/unity-explorer, write on this repo
#   - secrets.EXPLORER_TEAM_S3_BUCKET                 S3 bucket for the Allure report
#   - secrets.EXPLORER_TEAM_AWS_DEFAULT_REGION        AWS region the bucket lives in
#   - secrets.EXPLORER_TEAM_AWS_ACCESS_KEY_ID         S3 upload credentials
#   - secrets.EXPLORER_TEAM_AWS_SECRET_ACCESS_KEY     S3 upload credentials
#   - vars.EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL         Public-facing prefix of the bucket

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-baselines-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve trigger
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/generate-baselines')
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.gate.outputs.authorized }}
      mode: ${{ steps.flags.outputs.mode }}
      filter: ${{ steps.flags.outputs.filter }}
      pr_number: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_short_sha: ${{ steps.pr.outputs.head_short_sha }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      build_url: ${{ steps.build.outputs.build_url }}

    steps:
      - name: Gate by author association
        id: gate
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "authorized=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::notice::Ignoring /generate-baselines from $ASSOC ${{ github.event.comment.user.login }} — write access required."
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: React to the trigger comment
        if: steps.gate.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes >/dev/null

      - name: Resolve PR head
        id: pr
        if: steps.gate.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # issue_comment payload has no head info — fetch the PR.
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')

          if ! printf '%s' "$HEAD_REF" | grep -Eq '^[A-Za-z0-9._/-]+$' \
             || [ "${HEAD_REF#-}" != "$HEAD_REF" ]; then
            echo "::error::PR head ref '$HEAD_REF' contains characters that are not allowed in this pipeline. Allowed: A-Z a-z 0-9 . _ / -, and must not start with '-'."
            exit 1
          fi

          if ! printf '%s' "$HEAD_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::PR head SHA '$HEAD_SHA' is not a valid 40-char hex SHA."
            exit 1
          fi

          {
            echo "number=${PR_NUMBER}"
            echo "head_sha=${HEAD_SHA}"
            echo "head_short_sha=${HEAD_SHA:0:7}"
            echo "head_ref=${HEAD_REF}"
          } >> "$GITHUB_OUTPUT"

      - name: Parse flags from comment
        id: flags
        if: steps.gate.outputs.authorized == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          FIRST_LINE=$(printf '%s' "$COMMENT_BODY" | head -n1)
          REST="${FIRST_LINE#/generate-baselines}"
          REST="${REST# }"

          MODE=record
          FILTER=""

          # --filter is special: it greedily consumes the rest of the line, so it must be the last flag if both are given
          while [ -n "$REST" ]; do
            case "$REST" in
              --bootstrap|--bootstrap\ *)
                MODE=bootstrap
                REST="${REST#--bootstrap}"
                REST="${REST# }"
                ;;
              --filter\ *)
                FILTER="${REST#--filter }"
                REST=""
                ;;
              *)
                echo "::error::Unrecognized arguments to /generate-baselines: '$REST'. Expected: [--bootstrap] [--filter <expr>]"
                exit 1
                ;;
            esac
          done

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "filter<<${DELIM}"
            echo "${FILTER}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Mode: ${MODE}; Filter: ${FILTER:-<default>}"

      - name: Resolve Explorer build URL
        id: build
        if: steps.gate.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
          PUBLIC_URL_PREFIX: ${{ vars.EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -euo pipefail

          # ── 1. Look for a paired unity-explorer PR ──────────────────────
          PAIRED_PR_JSON=$(gh api \
            "repos/decentraland/unity-explorer/pulls?state=open&head=decentraland:${HEAD_REF}&per_page=1" \
            --jq '.[0]' 2>/dev/null || echo 'null')

          if [ "$PAIRED_PR_JSON" != "null" ] && [ -n "$PAIRED_PR_JSON" ]; then
            PAIRED_HEAD_SHA=$(echo "$PAIRED_PR_JSON" | jq -r '.head.sha')
            PAIRED_HEAD_REF=$(echo "$PAIRED_PR_JSON" | jq -r '.head.ref')
            PAIRED_PR_NUMBER=$(echo "$PAIRED_PR_JSON" | jq -r '.number')
            SHORT_SHA="${PAIRED_HEAD_SHA:0:7}"

            if ! printf '%s' "$PAIRED_HEAD_REF" | grep -Eq '^[A-Za-z0-9._/-]+$' \
               || [ "${PAIRED_HEAD_REF#-}" != "$PAIRED_HEAD_REF" ] \
               || ! printf '%s' "$PAIRED_HEAD_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::warning::Paired unity-explorer PR #${PAIRED_PR_NUMBER} has a ref/SHA outside the allowed character set; falling back to release."
              PAIRED_PR_JSON='null'
            fi
          fi

          if [ "$PAIRED_PR_JSON" != "null" ] && [ -n "$PAIRED_PR_JSON" ]; then

            # Find the latest successful Unity Cloud Build for that SHA
            RUN_JSON=$(gh api \
              "repos/decentraland/unity-explorer/actions/runs?head_sha=${PAIRED_HEAD_SHA}&status=success&per_page=20" \
              --jq '[.workflow_runs[] | select(.name == "Unity Cloud Build")] | .[0]')

            if [ -n "$RUN_JSON" ] && [ "$RUN_JSON" != "null" ]; then
              RUN_NUMBER=$(echo "$RUN_JSON" | jq -r '.run_number')
              ORIGINAL_EVENT=$(echo "$RUN_JSON" | jq -r '.event')
              if [ "$ORIGINAL_EVENT" = "pull_request" ]; then
                ARTIFACT_PATH="@dcl/unity-explorer/branch/${PAIRED_HEAD_REF}/pr-${RUN_NUMBER}-${SHORT_SHA}"
                BUILD_URL="${PUBLIC_URL_PREFIX}/${ARTIFACT_PATH}/Decentraland_macos.zip"
                echo "::notice::Recording against paired unity-explorer PR #${PAIRED_PR_NUMBER} (${SHORT_SHA})."
                echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "::warning::Paired unity-explorer PR #${PAIRED_PR_NUMBER} found, but its latest Unity Cloud Build for ${SHORT_SHA} was triggered by '${ORIGINAL_EVENT}', not pull_request. Falling back to release."
            else
              echo "::warning::Paired unity-explorer PR #${PAIRED_PR_NUMBER} found, but no successful Unity Cloud Build yet for ${SHORT_SHA}. Falling back to release."
            fi
          fi

          # ── 2. Fallback: latest non-prerelease unity-explorer release ────
          RELEASE_JSON=$(gh api \
            "repos/decentraland/unity-explorer/releases?per_page=20" \
            --jq '[.[] | select(.prerelease == false and .draft == false)] | .[0]')

          if [ -z "$RELEASE_JSON" ] || [ "$RELEASE_JSON" = "null" ]; then
            echo "::error::No paired unity-explorer PR build available, and no published release found. Cannot record baselines."
            exit 1
          fi

          RELEASE_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          BUILD_URL=$(echo "$RELEASE_JSON" \
            | jq -r '.assets[] | select(.name == "Decentraland_macos.zip") | .browser_download_url')

          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "::error::Release ${RELEASE_TAG} has no Decentraland_macos.zip asset attached."
            exit 1
          fi

          echo "::notice::Recording against unity-explorer release ${RELEASE_TAG}."
          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"

  run-suite:
    name: Regenerate baselines (${{ needs.resolve.outputs.mode }})
    needs: resolve
    if: needs.resolve.outputs.authorized == 'true'
    uses: ./.github/workflows/run-visual-suite.yml
    with:
      mode: ${{ needs.resolve.outputs.mode }}
      filter: ${{ needs.resolve.outputs.filter }}
      pr_number: ${{ needs.resolve.outputs.pr_number }}
      build_url: ${{ needs.resolve.outputs.build_url }}
      tests_ref: ${{ needs.resolve.outputs.head_ref }}
      commit_sha: ${{ needs.resolve.outputs.head_short_sha }}
      branch_label: ${{ needs.resolve.outputs.head_ref }}
    secrets: inherit
