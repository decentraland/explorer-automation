name: Runner Validation (Windows)

# Validates the Explorer E2E pipeline (C# AltTester + MetaForge + NUnit) on
# the self-hosted `win-gpu-t4-onboarding` runner. This is the Windows
# counterpart to Nicolas's macOS `run-visual-suite.yml` reusable workflow
# (PR #2 / feat/snapshots-comparison), but:
#   - Targets self-hosted Windows w/ NVIDIA T4 instead of macos-14
#   - Runs the `InWorld` NUnit category (single smoke test by default)
#     instead of the `Visual` category
#   - Uses PowerShell blocks lifted from
#     decentraland/onboarding-e2e/.github/workflows/explorer-smoke.yaml
#     (GPU diagnostics, VC++ redist, Player.log polling, process cleanup)
#
# Goal of this workflow: prove the chassis works end-to-end on Windows,
# producing one green InWorld run + Allure on S3. Once green, we expand
# coverage and add nightly cron.
#
# Triggers:
#   - workflow_dispatch (manual, with overrides for build_url + test filter)
#   - push on feat/runner-validation if this YAML changes (fast iteration
#     during PR review; remove or narrow before merging to main)
#
# Required secrets (per Slack thread 2026-05-08, Charly provisioned):
#   - ALTTESTER_LICENSE                        AltTester Pro license key
#   - REPOS_READ_ONLY_TOKEN                    PAT - read on decentraland/MetaForge
#   - DEV_EXPLORER_TEAM_S3_BUCKET              S3 bucket for the Allure report
#   - DEV_EXPLORER_TEAM_AWS_DEFAULT_REGION     AWS region the bucket lives in
#   - DEV_EXPLORER_TEAM_AWS_ACCESS_KEY_ID      S3 upload credentials
#   - DEV_EXPLORER_TEAM_AWS_SECRET_ACCESS_KEY  S3 upload credentials
#
# Required vars:
#   - DEV_EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL   Public-facing prefix of the bucket
#
# Runner access prerequisite:
#   The `win-gpu-t4-onboarding` runner tag must be granted to
#   decentraland/explorer-automation. As of 2026-05-11 the tag is registered
#   on decentraland/onboarding-e2e - confirmation pending from Charly.

on:
  workflow_dispatch:
    inputs:
      build_url:
        description: 'Direct URL to a Decentraland_windows64.zip. Empty = latest non-prerelease unity-explorer release.'
        type: string
        required: false
        default: ''
      test_filter:
        description: 'NUnit --filter expression. Default targets a single InWorld smoke test.'
        type: string
        required: false
        default: 'Name=TestOpenPlacesWithShortcut'
      dry_run:
        description: 'Skip mf explorer test invocation (chassis validation only - useful before runner access is granted).'
        type: boolean
        required: false
        default: false
      diagnose_alttester:
        description: 'Run AltTester loader-hang diagnostic (Procmon + ProcDump capture) instead of the InWorld suite. Local probes proved -batchmode -nographics works on Windows 11 in user session AND under LocalSystem session 0 (both ready in 5-11s); this step captures a full memory dump of the hung AltTester on the runner to find the real root cause.'
        type: boolean
        required: false
        default: false

  # Disabled to avoid double-triggering during diag iterations. Pushing a
  # workflow change competes with the manual `workflow_dispatch` run we use to
  # set the `diagnose_alttester=true` input (concurrency group serializes the
  # two, blocking the dispatched run for 10+ min on the auto-triggered one).
  # Re-enable before merging to main if you want push-on-YAML-change feedback.
  # push:
  #   branches: [feat/runner-validation]
  #   paths:
  #     - '.github/workflows/runner-validation-windows.yml'

# Serialize runs on the shared self-hosted runner. We don't cancel in-flight
# runs because the runner is persistent: an interrupted test can leave
# Decentraland.exe / AltTester running and corrupt the next run's Player.log.
# Let queued runs wait for the current run's cleanup step to finish.
concurrency:
  group: runner-validation-windows
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── 1. Resolve build URL on a cheap runner so the GPU runner only does ──
  # ── the heavy work. Mirrors Pravus's manual-visual-tests.yml resolve. ──
  resolve:
    name: Resolve build URL
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_url: ${{ steps.build.outputs.build_url }}
    steps:
      - name: Resolve Explorer build URL
        id: build
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
          OVERRIDE: ${{ inputs.build_url }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "::notice::Using user-supplied build URL."
            echo "build_url=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_JSON=$(gh api \
            "repos/decentraland/unity-explorer/releases?per_page=20" \
            --jq '[.[] | select(.prerelease == false and .draft == false)] | .[0]')

          if [ -z "$RELEASE_JSON" ] || [ "$RELEASE_JSON" = "null" ]; then
            echo "::error::No published unity-explorer release found and no build_url override given."
            exit 1
          fi

          RELEASE_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          BUILD_URL=$(echo "$RELEASE_JSON" \
            | jq -r '.assets[] | select(.name == "Decentraland_windows64.zip") | .browser_download_url')

          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "::error::Release ${RELEASE_TAG} has no Decentraland_windows64.zip asset attached."
            exit 1
          fi

          echo "::notice::Using unity-explorer release ${RELEASE_TAG}."
          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"

  run:
    name: Runner validation (InWorld smoke)
    needs: resolve
    runs-on: ["win-gpu-t4-onboarding-new-image"]
    timeout-minutes: 45

    env:
      BUILD_URL: ${{ needs.resolve.outputs.build_url }}
      TEST_FILTER: ${{ inputs.test_filter || 'Name=TestOpenPlacesWithShortcut' }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      COMMIT_SHA: ${{ github.sha }}
      PUBLIC_URL_PREFIX: ${{ vars.DEV_EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL }}
      # Pre-derive Windows MetaForge userdata root. install.ps1 should write
      # the binary here; we add it to PATH after install.
      MF_BIN_DIR: ${{ format('{0}\Decentraland\MetaForge\bin', '%LOCALAPPDATA%') }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute identifiers
        id: ids
        shell: powershell
        run: |
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $s3Path = "@dcl/decentraland-explorer-automation/runner-validation-windows/$($env:GITHUB_RUN_ID)/$shortSha"
          $reportUrl = "$($env:PUBLIC_URL_PREFIX)/$s3Path/index.html"
          "s3_path=$s3Path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "report_url=$reportUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "short_sha=$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── GPU diagnostics (never fails; surfaces hardware state in logs) ──
      # Lifted from onboarding-e2e/explorer-smoke.yaml; safe to re-run on a
      # persistent runner since it only reads device info. Extended with
      # driver-model + Vulkan ICD probes because the previous Vulkan smoke
      # showed `InitializeEngineGraphics failed` on this image, and the
      # leading theory is that the T4 ships in TCC (compute-only) mode with
      # no Vulkan ICD exposed.
      - name: GPU diagnostics
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "=== Video Controllers ==="
          Get-WmiObject Win32_VideoController | Format-List Name, DriverVersion, Status, AdapterRAM, VideoProcessor
          Write-Host "=== nvidia-smi (basic) ==="
          try { nvidia-smi } catch { Write-Host "nvidia-smi not on PATH" }
          Write-Host "=== nvidia-smi driver model (TCC vs WDDM) ==="
          # TCC = Tesla Compute Cluster (compute-only, no DX/Vulkan ICD).
          # WDDM = Windows Display Driver Model (graphics-capable).
          # For Unity / AltTester to render we need WDDM. Switch is
          # `nvidia-smi -dm 0` (WDDM) / `-dm 1` (TCC) on supported SKUs.
          try { nvidia-smi --query-gpu=name,driver_model.current,driver_model.pending --format=csv } catch { Write-Host "driver_model query failed: $_" }
          Write-Host "=== Vulkan ICDs in registry ==="
          # Unity Vulkan loader reads these registry keys. Empty = no ICD
          # installed and Vulkan WILL fail to init regardless of GPU state.
          $icdPaths = @(
            "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers",
            "HKLM:\SOFTWARE\WOW6432Node\Khronos\Vulkan\Drivers"
          )
          foreach ($p in $icdPaths) {
            Write-Host "--- $p ---"
            if (Test-Path $p) {
              Get-ItemProperty -Path $p | Format-List
            } else {
              Write-Host "(missing)"
            }
          }
          Write-Host "=== nvoglv64.dll / vulkan-1.dll on disk ==="
          $sys = "$env:SystemRoot\System32"
          foreach ($dll in @("nvoglv64.dll", "vulkan-1.dll", "nvcuda.dll", "nvapi64.dll")) {
            $path = Join-Path $sys $dll
            if (Test-Path $path) {
              $v = (Get-Item $path).VersionInfo.FileVersion
              Write-Host "$dll : present (version $v)"
            } else {
              Write-Host "$dll : MISSING"
            }
          }
          Write-Host "=== PCI Devices (Display) ==="
          Get-PnpDevice -Class Display -ErrorAction SilentlyContinue | Format-List FriendlyName, InstanceId, Status
          Write-Host "=== PnP devices with NVIDIA vendor ID (VEN_10DE), any class ==="
          # Per Charly: a driverless GPU is filed under Other / Unknown, not
          # Display - so the `-Class Display` filter above misses it. This
          # probe matches by PCI vendor ID instead and tells us whether the
          # T4 is even mapped to the VM regardless of driver state.
          Get-PnpDevice -PresentOnly -ErrorAction SilentlyContinue |
            Where-Object { $_.InstanceId -like '*VEN_10DE*' } |
            Select-Object Status, Problem, Class, FriendlyName, InstanceId |
            Format-List
          Write-Host "=== dxdiag (display section) ==="
          # Charly's checklist asked for dxdiag confirming the T4 (not
          # Microsoft Basic Render Driver) as the display device.
          $dxOut = Join-Path $env:TEMP "dxdiag.txt"
          if (Test-Path $dxOut) { Remove-Item $dxOut -Force }
          Start-Process -FilePath dxdiag -ArgumentList "/t",$dxOut -Wait -ErrorAction SilentlyContinue
          if (Test-Path $dxOut) {
            $lines = Get-Content $dxOut
            $idx = ($lines | Select-String -Pattern "Display Devices" | Select-Object -First 1).LineNumber
            if ($idx) {
              # Print Display Devices section through next major header
              $slice = $lines[($idx - 1)..([Math]::Min($idx + 40, $lines.Count - 1))]
              $slice | ForEach-Object { Write-Host $_ }
            } else {
              Write-Host "(no 'Display Devices' header found in dxdiag output)"
            }
          } else {
            Write-Host "(dxdiag did not produce output)"
          }

      - name: Install NVIDIA driver (PoC)
        shell: powershell
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"

          # Idempotent: persistent runner means driver survives across runs once bound.
          $bound = Get-PnpDevice -PresentOnly -ErrorAction SilentlyContinue |
            Where-Object { $_.InstanceId -like '*VEN_10DE*' -and $_.Status -eq 'OK' }
          if ($bound) {
            Write-Host "NVIDIA device already bound; skipping install."
            try { nvidia-smi } catch { Write-Host "(nvidia-smi not on PATH for this shell yet)" }
            return
          }

          # Azure-redistributed GRID vGPU18 (572.83) for NCasT4_v3 on Win10/11/Server 2022.
          # Source: https://learn.microsoft.com/en-us/azure/virtual-machines/windows/n-series-driver-setup
          $url = "https://download.microsoft.com/download/5ccc0984-e1b5-494d-8211-43b19ece6b9b/572.83_grid_win10_win11_server2022_dch_64bit_international_azure_swl.exe"
          $installer = Join-Path $env:TEMP "nvidia-grid-572.83.exe"

          Write-Host "Downloading GRID 572.83 from $url"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $installer

          Write-Host "Installing silently"
          $proc = Start-Process -FilePath $installer -ArgumentList "-s","-clean","-noreboot","-noeula" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"   # 0 = ok, 1 = reboot requested

          # Previous attempt used Restart-Computer -Force, which appears to be
          # silently dropped by GitHub's runner sandbox - the install completed
          # but the device stayed in CM_PROB_FAILED_INSTALL across runs and the
          # job hung instead of dying cleanly.
          #
          # Alternative: force PnP to re-evaluate the failed device. The driver
          # is in the driver store after install; we just need Windows to retry
          # binding it without a full OS reboot. Two-stage attempt:
          #   1) pnputil /scan-devices  - lightweight, broadcasts WM_DEVICECHANGE
          #   2) Disable/Enable on the specific VEN_10DE node - more invasive
          #      reset of the device's PnP state if (1) wasn't enough.
          Write-Host "Triggering PnP rescan to bind freshly-installed driver"
          pnputil /scan-devices
          Start-Sleep -Seconds 15

          $stillFailed = Get-PnpDevice -PresentOnly -ErrorAction SilentlyContinue |
            Where-Object { $_.InstanceId -like '*VEN_10DE*' -and $_.Status -ne 'OK' }
          if ($stillFailed) {
            Write-Host "Device still not bound after scan-devices; toggling disable/enable on the NVIDIA PnP node(s)"
            foreach ($dev in $stillFailed) {
              Write-Host "  Disable+Enable: $($dev.InstanceId)"
              Disable-PnpDevice -InstanceId $dev.InstanceId -Confirm:$false -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 3
              Enable-PnpDevice  -InstanceId $dev.InstanceId -Confirm:$false -ErrorAction SilentlyContinue
            }
            Start-Sleep -Seconds 10
          }

          # Refresh process PATH so nvidia-smi resolves in subsequent steps
          # without restarting the shell.
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH","Machine")
          $userPath    = [System.Environment]::GetEnvironmentVariable("PATH","User")
          $env:PATH = "$machinePath;$userPath"

      # ── VC++ Redistributable: Unity Player .exe links MSVC runtime
      # (msvcp140.dll). Probe registry first - Microsoft Data Science
      # Windows Server 2019 image (win-gpu-t4-onboarding's partner image)
      # ships VC++ as a transitive dep of Anaconda/CUDA/VS Build Tools.
      # In run 25735922187 the blind installer call hung ~25 minutes on the
      # already-installed runner; the probe short-circuits that. The install
      # fallback still runs on images that don't ship it (e.g. vanilla
      # GH-hosted windows-latest if we ever target it).
      - name: Ensure Visual C++ Redistributable
        shell: powershell
        timeout-minutes: 5
        run: |
          $key = "HKLM:\SOFTWARE\Microsoft\VisualStudio\14.0\VC\Runtimes\x64"
          $info = Get-ItemProperty -Path $key -ErrorAction SilentlyContinue
          if ($info -and $info.Installed -eq 1) {
            Write-Host "VC++ Redistributable already installed (version $($info.Version), bld $($info.Bld)); skipping."
            return
          }
          Write-Host "VC++ Redistributable not detected at $key - installing."
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $installer = Join-Path $env:TEMP "vc_redist.x64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/install","/quiet","/norestart" -Wait
          Write-Host "Visual C++ Redistributable install completed (exit codes 0/1638/3010 are all OK)."

      # .NET 10 SDK via official action. Cached on Azure CDN with built-in
      # retry, much more reliable than dotnet-install.ps1 on this runner's
      # slow outbound. The action no-ops fast when the SDK is already cached
      # under %LOCALAPPDATA%\Microsoft\dotnet on the persistent runner.
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        timeout-minutes: 25
        with:
          dotnet-version: '10.0.x'

      # AltTester Desktop. MetaForge hardcodes the lookup path in
      # PathHelpers.GetAlttesterExecutablePath() -> C:\Program Files\
      # AltTesterDesktop\AltTesterDesktop.exe (no env/config override).
      #
      # Root cause discovered 2026-05-13 (run 25804210670, dump analysis):
      # `AltTesterDesktop__v<ver>.exe` inside the upstream zip is NOT the
      # Unity binary - it is an Inno Setup 6.1.0 installer (~122 MB, x86)
      # that EXTRACTS the real Unity layout to its target dir. Previous
      # workflow renamed the installer to AltTesterDesktop.exe and tried to
      # launch it with `-batchmode -nographics -port -license` flags; the
      # installer ignored the Unity flags and sat waiting for GUI input,
      # which is exactly the 90s "AltTester did not become ready" hang we
      # chased for days. The real Unity binary after a proper install is
      # ~666 KB / x64 and ships alongside UnityPlayer.dll +
      # AltTesterDesktop_Data\ + MonoBleedingEdge\.
      #
      # Correct invocation: run the installer with Inno Setup silent flags
      # to actually install. Re-install also blows away any stale renamed-
      # installer leftover on the persistent runner.
      - name: Install AltTester Desktop
        shell: powershell
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = "C:\Program Files\AltTesterDesktop"
          $target = Join-Path $installDir "AltTesterDesktop.exe"
          # Detect prior healthy install: real Unity binary is small (<5 MB)
          # and shipped with UnityPlayer.dll. The bogus renamed-installer
          # state has a 100+ MB AltTesterDesktop.exe and no UnityPlayer.dll.
          $needsInstall = $true
          if ((Test-Path $target) -and (Test-Path (Join-Path $installDir "UnityPlayer.dll"))) {
            $sizeMb = (Get-Item $target).Length / 1MB
            if ($sizeMb -lt 5) {
              Write-Host ("AltTester Desktop already installed at {0} (size {1:N1} MB) - skipping." -f $target, $sizeMb)
              $needsInstall = $false
            } else {
              Write-Host ("Stale AltTesterDesktop.exe at $target is {0:N1} MB (looks like renamed Inno installer). Will reinstall." -f $sizeMb)
            }
          }
          if ($needsInstall) {
            # Clean any prior (broken) deployment so the installer has a clean slate.
            if (Test-Path $installDir) { Remove-Item $installDir -Recurse -Force -ErrorAction SilentlyContinue }
            $url = "https://alttester.com/app/uploads/AltTester/desktop/AltTesterDesktopPackageWindows__2_3_1.zip"
            $zip = Join-Path $env:RUNNER_TEMP "alttester.zip"
            $extractDir = Join-Path $env:RUNNER_TEMP "alttester-installer"
            Write-Host "Downloading $url"
            Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $zip
            if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
            Expand-Archive -Path $zip -DestinationPath $extractDir
            $installer = Get-ChildItem -Path $extractDir -Recurse -Filter "AltTesterDesktop*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installer) { throw "AltTester installer not found inside the Windows package zip" }
            Write-Host "Running Inno Setup installer silently: $($installer.FullName)"
            # /VERYSILENT - no UI; /SUPPRESSMSGBOXES - skip Yes/No dialogs;
            # /DIR - install location; /NORESTART - never reboot.
            $proc = Start-Process -FilePath $installer.FullName `
              -ArgumentList @("/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/DIR=`"$installDir`"") `
              -Wait -PassThru
            if ($proc.ExitCode -ne 0) {
              throw "AltTester installer exited with code $($proc.ExitCode)"
            }
          }
          # Post-install verification: must have small x64 .exe and UnityPlayer.dll.
          if (-not (Test-Path $target)) { throw "Install completed but $target is missing" }
          if (-not (Test-Path (Join-Path $installDir "UnityPlayer.dll"))) {
            throw "Install completed but UnityPlayer.dll is missing under $installDir"
          }
          $bytes = [System.IO.File]::ReadAllBytes($target)
          $peOff = [BitConverter]::ToInt32($bytes, 60)
          $machine = [BitConverter]::ToUInt16($bytes, $peOff + 4)
          $machineName = switch ($machine) { 0x014c {"x86"} 0x8664 {"x64"} 0xAA64 {"ARM64"} default { ("0x{0:X}" -f $machine) } }
          $sz = (Get-Item $target).Length
          Write-Host ("Verified AltTesterDesktop.exe: {0} bytes, machine={1}" -f $sz, $machineName)
          if ($machine -ne 0x8664) {
            throw "AltTesterDesktop.exe is not x64 after install (machine=$machineName). Refusing to proceed."
          }
          if ($sz -gt 5MB) {
            throw "AltTesterDesktop.exe is unexpectedly large ($sz bytes); installer probably didn't run."
          }

      # GitHub CLI is not on the partner image. MetaForge's install.ps1
      # requires `gh` (release list/download against the private repo) and
      # falls back to `winget install GitHub.cli` which is unreliable on
      # Windows Server SKUs. Side-load the official release zip into a
      # user-local dir and prepend to PATH; `gh` then picks up GH_TOKEN
      # from the env without interactive login.
      - name: Install GitHub CLI
        shell: powershell
        timeout-minutes: 15
        run: |
          $version = "2.63.0"
          $dest = Join-Path $env:USERPROFILE "gh-cli"

          # 1. Already on PATH for this job? Skip.
          if (Get-Command gh -ErrorAction SilentlyContinue) {
            Write-Host "gh CLI already on PATH: $(gh --version | Select-Object -First 1) - skipping install."
            return
          }

          # 2. Side-loaded by a prior job on this persistent runner? Reuse.
          # GITHUB_PATH is job-scoped (lost between jobs), but $USERPROFILE
          # files survive. Probe before downloading 36 MB again on a slow
          # outbound link.
          $cached = $null
          if (Test-Path $dest) {
            $cached = Get-ChildItem -Path $dest -Recurse -Filter "gh.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($cached) {
            $binDir = Split-Path -Parent $cached.FullName
            Write-Host "gh CLI cached on disk: $($cached.FullName) - reusing."
            "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            $env:PATH = "$binDir;$env:PATH"
            & $cached.FullName --version
            return
          }

          # 3. Cold install: download the release zip and extract.
          $zip = Join-Path $env:TEMP "gh_cli.zip"
          $url = "https://github.com/cli/cli/releases/download/v$version/gh_${version}_windows_amd64.zip"
          Write-Host "Downloading gh CLI $version from $url"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $zip
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $dest
          $bin = Get-ChildItem -Path $dest -Recurse -Filter "gh.exe" | Select-Object -First 1
          if (-not $bin) { throw "gh.exe not found in extracted gh CLI release zip" }
          $binDir = Split-Path -Parent $bin.FullName
          "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$binDir;$env:PATH"
          & $bin.FullName --version

      # Git is required by `mf explorer test` (MetaForge clones the
      # explorer-automation repo internally to pull Tests/scenes/baselines).
      # The "Base Image for Windows 11 Desktop" partner image does not ship
      # git, so the first real `mf explorer test` invocation aborted with
      # "Error: git is not installed" before reaching AltTester. Side-load
      # MinGit (~50 MB portable build) to USERPROFILE and prepend to PATH;
      # the persistent runner caches it across jobs.
      - name: Install Git for Windows (MinGit)
        shell: powershell
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Command git -ErrorAction SilentlyContinue) {
            Write-Host "git already on PATH: $(git --version) - skipping install."
            return
          }
          $dest = Join-Path $env:USERPROFILE "git-mingit"
          $cached = $null
          if (Test-Path $dest) {
            $cached = Get-ChildItem -Path $dest -Recurse -Filter "git.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($cached) {
            $binDir = Split-Path -Parent $cached.FullName
            Write-Host "git cached on disk: $($cached.FullName) - reusing."
            "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            $env:PATH = "$binDir;$env:PATH"
            & $cached.FullName --version
            return
          }
          $tag = "v2.54.0.windows.1"
          $version = "2.54.0"
          $url = "https://github.com/git-for-windows/git/releases/download/$tag/MinGit-$version-64-bit.zip"
          $zip = Join-Path $env:TEMP "mingit.zip"
          Write-Host "Downloading MinGit $version from $url"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $zip
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $dest
          $bin = Get-ChildItem -Path $dest -Recurse -Filter "git.exe" | Select-Object -First 1
          if (-not $bin) { throw "git.exe not found in extracted MinGit zip" }
          $binDir = Split-Path -Parent $bin.FullName
          "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$binDir;$env:PATH"
          & $bin.FullName --version

      - name: Verify MetaForge access
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Error "Missing REPOS_READ_ONLY_TOKEN secret (PAT with read access to decentraland/MetaForge)"
            exit 1
          }
          gh api repos/decentraland/MetaForge/releases/latest --jq '.tag_name'

      # ── MetaForge installer. install.ps1 verified to exist (200 OK, ──
      # ── 2026-05-11). Drops `mf` into $LOCALAPPDATA\Decentraland\MetaForge\bin ──
      # ── by convention (mirror of macOS Library/Application Support path). ──
      # ── If install.ps1 picks a different path, the discovery step below ──
      # ── surfaces it and we adjust. ──
      - name: Install MetaForge
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          iex (irm https://explorer-artifacts.decentraland.zone/tools/install.ps1)

      - name: Discover mf on PATH
        shell: powershell
        run: |
          $candidates = @(
            "$env:LOCALAPPDATA\Decentraland\MetaForge\bin",
            "$env:APPDATA\Decentraland\MetaForge\bin",
            "$env:USERPROFILE\.metaforge\bin"
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path (Join-Path $c "mf.exe")) { $found = $c; break }
            if (Test-Path (Join-Path $c "mf.cmd")) { $found = $c; break }
            if (Test-Path (Join-Path $c "mf"))     { $found = $c; break }
          }
          if (-not $found) {
            Write-Host "Searched: $($candidates -join '; ')"
            Write-Host "Directory listings:"
            foreach ($c in $candidates) { if (Test-Path $c) { Get-ChildItem $c | Select-Object FullName } }
            throw "mf binary not found in any expected location"
          }
          Write-Host "Found mf in: $found"
          $found | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$found;$env:PATH"
          mf --version

      - name: Configure AltTester license
        shell: powershell
        env:
          ALTTESTER_LICENSE: ${{ secrets.ALTTESTER_LICENSE }}
        run: |
          if (-not $env:ALTTESTER_LICENSE) {
            Write-Error "Missing ALTTESTER_LICENSE secret. Add it under repo Settings -> Secrets -> Actions."
            exit 1
          }
          mf alttester set-license $env:ALTTESTER_LICENSE

      # ── mf account login writes auth-token state into Explorer's userdata ──
      # ── dir, which only exists after Explorer has been installed at least ──
      # ── once. Pre-install up front so login doesn't trip on a missing path. ──
      - name: Pre-install Explorer build
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          if (-not $env:BUILD_URL) { throw "BUILD_URL is empty (resolve job failed?)" }
          Write-Host "Installing Explorer from $env:BUILD_URL"
          mf explorer install $env:BUILD_URL --non-interactive

      - name: Provision metaforge test account
        shell: powershell
        run: |
          $userdata = Join-Path $env:USERPROFILE "AppData\LocalLow\Decentraland\Explorer"
          if (-not (Test-Path $userdata)) { New-Item -Path $userdata -ItemType Directory -Force | Out-Null }
          $account = "ci-inworld-$env:GITHUB_RUN_ID"
          mf account create $account --env zone
          mf account login $account
          "MF_ACCOUNT=$account" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ── Clean Player.log before launch so polling sees only this run's lines. ──
      - name: Clear Explorer Player.log
        shell: powershell
        run: |
          $logPath = Join-Path $env:USERPROFILE "AppData\LocalLow\Decentraland\Explorer\Player.log"
          if (Test-Path $logPath) { Remove-Item $logPath -Force; Write-Host "Cleared $logPath" }

      # `mf explorer test` invokes the `allure` CLI to build the report. The
      # current partner image (Base Image for Windows 11 Desktop, run on
      # win-gpu-t4-onboarding-new-image) does NOT ship Node.js (unlike the
      # earlier Data Science Server 2022 image which did). Install Node via
      # the standard action first, then `npm install -g allure` to avoid
      # the interactive prompt that aborts under --non-interactive.
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install allure CLI
        shell: powershell
        timeout-minutes: 5
        run: |
          if (-not (Get-Command npm -ErrorAction SilentlyContinue)) {
            Write-Error "npm is not on PATH after setup-node - investigate."
            exit 1
          }
          npm install -g allure --no-fund --no-audit --loglevel=error
          # npm global prefix (e.g. %APPDATA%\npm on Windows) is not on PATH
          # for this shell session; prepend it so `mf` and subsequent steps
          # find the freshly-installed allure.cmd.
          $npmPrefix = (& npm config get prefix).Trim()
          if (-not $npmPrefix -or -not (Test-Path $npmPrefix)) {
            throw "Could not resolve npm prefix dir (got: '$npmPrefix')"
          }
          "$npmPrefix" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$npmPrefix;$env:PATH"
          & (Join-Path $npmPrefix "allure.cmd") --version

      # TEMP smoke: launch Decentraland.exe directly in *normal* (non-batch)
      # mode without AltTester to verify the basic chassis - that the GPU /
      # graphics stack on this runner can actually initialize a Vulkan device
      # and start the Unity engine. We've been stuck on AltTester batchmode
      # never advertising the ready line; before chasing that further, prove
      # the underlying Explorer can render at all on this T4 + Server 2022
      # image. If this smoke shows clean Vulkan init, the AltTester issue is
      # isolated to batchmode/license. If it fails, the chassis itself is the
      # blocker and AltTester debugging is premature.
      #
      # mf explorer install (above) drops the build under
      #   %LOCALAPPDATA%\Decentraland\MetaForge\explorer\<version>\Decentraland.exe
      # (see MetaForgeCLI/Services/ExplorerVersionService.cs:39,113).
      - name: Smoke - Explorer Vulkan launch (no batch, no AltTester)
        if: false  # Confirmed graphics chassis: D3D11 on NVIDIA Tesla T4 renders, log-matrix override applied. Re-enable only to debug a future regression.
        shell: powershell
        timeout-minutes: 7
        run: |
          $ErrorActionPreference = "Continue"
          $versionsRoot = Join-Path $env:LOCALAPPDATA "Decentraland\MetaForge\explorer"
          if (-not (Test-Path $versionsRoot)) {
            throw "Explorer versions dir not found: $versionsRoot (did 'mf explorer install' succeed?)"
          }
          $exe = Get-ChildItem -Path $versionsRoot -Recurse -Filter "Decentraland.exe" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Host "Versions dir contents:"
            Get-ChildItem -Path $versionsRoot -Recurse | Select-Object FullName
            throw "Decentraland.exe not found under $versionsRoot"
          }
          Write-Host "Found Explorer: $($exe.FullName)"
          $buildDir = Split-Path -Parent $exe.FullName

          # Clean Player.log for a fresh trace.
          $logPath = Join-Path $env:USERPROFILE "AppData\LocalLow\Decentraland\Explorer\Player.log"
          if (Test-Path $logPath) { Remove-Item $logPath -Force }

          # Explorer's default ReportCategory filter silences info logs for
          # ~120 categories incl. STARTUP, AUTHENTICATION, SCENE_LOADING,
          # ENGINE, FEATURE_FLAGS, ASSETS_PROVISION. Without these on, the
          # log goes silent right after the device-info banner and we have
          # no way to tell where the splash/auth/realm flow is stuck.
          # `--use-log-matrix <json>` (built-in CI flag) lets us re-enable
          # them. `override: false` merges over the default matrix so we
          # *add* visibility without silencing anything else.
          $logCategories = @(
            "STARTUP", "AUTHENTICATION", "SCENE_LOADING", "ENGINE",
            "FEATURE_FLAGS", "ASSETS_PROVISION", "LANDSCAPE",
            "REALM_DATA_DIRTY_RESET_SYSTEM", "MULTIPLAYER",
            "COMMS_SCENE_HANDLER", "COMMS_API", "AUTHENTICATION",
            "CRDT", "SCENE_FACTORY", "GENERIC_WEB_REQUEST"
          ) | Sort-Object -Unique
          $severities = @("Log", "Warning", "Error", "Exception")
          $entries = @()
          foreach ($cat in $logCategories) {
            foreach ($sev in $severities) {
              $entries += [ordered]@{ category = $cat; severity = $sev }
            }
          }
          $matrix = [ordered]@{
            override = $false
            debugLogMatrix = $entries
            sentryMatrix = @()
          }
          $matrixPath = Join-Path $buildDir "ci-log-matrix.json"
          $matrix | ConvertTo-Json -Depth 5 | Set-Content -Path $matrixPath -Encoding utf8
          Write-Host "Wrote log matrix to $matrixPath"

          # Previous run with -force-vulkan produced:
          #   Forcing GfxDevice: Vulkan
          #   InitializeEngineGraphics failed
          # Drop the Vulkan force so Unity picks its default chain
          # (D3D12 -> D3D11 -> Vulkan). If any of the three works, the
          # chassis is viable.
          # Order matters: Decentraland's custom `--use-log-matrix` parser
          # picks the *next* arg after the flag, but it seems to skip past
          # Unity built-in `-screen-*` flags and end up grabbing the last
          # positional (e.g. "720" from `-screen-height 720`). Putting our
          # flag at the very end keeps the next-token unambiguous.
          $arglist = @(
            "-screen-fullscreen", "0",
            "-screen-width", "1280",
            "-screen-height", "720",
            "--use-log-matrix", $matrixPath
          )
          Write-Host "Launching: $($exe.FullName) $($arglist -join ' ')"
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList $arglist -PassThru
          Write-Host "Started PID $($proc.Id). Sleeping 300s (5 min) to let Unity boot through splash/auth/realm..."
          Start-Sleep -Seconds 300

          Write-Host "--- proc state ---"
          $live = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if ($live) {
            Write-Host "Still running. HasExited=$($live.HasExited)"
          } else {
            Write-Host "Process exited early. ExitCode=$($proc.ExitCode)"
          }

          Write-Host "--- Player.log path ---"
          Write-Host $logPath
          if (-not (Test-Path $logPath)) {
            Write-Host "::warning::Player.log was never created - Unity may have failed before logging init."
          } else {
            Write-Host "--- Player.log (full) ---"
            Get-Content $logPath
            Write-Host "--- Player.log filtered: Vulkan / GfxDevice / Renderer / engine / ERROR ---"
            Select-String -Path $logPath -Pattern "Vulkan|GfxDevice|Renderer:|Initialize engine|GPU|Direct3D|OpenGL|ERROR|Failed|Exception" -SimpleMatch:$false |
              ForEach-Object { Write-Host $_.Line }
          }

          if ($live) {
            Write-Host "Killing Explorer PID $($proc.Id)"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      # AltTester Desktop is itself a Unity app, so its stdout is empty even
      # when it runs fine - it writes everything to a *Player.log* inside
      # %USERPROFILE%\AppData\LocalLow\<Company>\<Product>\. MetaForge's
      # AltTesterService watches stdout for "AltTester(R) Server is running
      # on port 13000" - which is why it always times out on Windows: the
      # line is never on stdout, only in Player.log. This smoke launches the
      # exe with -batchmode + -logFile <path> to *force* Unity to redirect
      # its log to a file we control, then grep for the ready line.
      - name: Smoke - AltTester batchmode + Player.log capture
        if: false  # Confirmed AltTester Desktop batchmode hangs in Unity init even on WDDM/T4 (no -logFile output, no Player.log). Same hang the cleanup step guards against. Re-enable to re-diagnose if behavior changes.
        shell: powershell
        timeout-minutes: 3
        env:
          ALTTESTER_LICENSE: ${{ secrets.ALTTESTER_LICENSE }}
        run: |
          $ErrorActionPreference = "Continue"
          $exe = "C:\Program Files\AltTesterDesktop\AltTesterDesktop.exe"
          if (-not (Test-Path $exe)) { throw "AltTester Desktop not at $exe" }
          if (-not $env:ALTTESTER_LICENSE) { throw "ALTTESTER_LICENSE secret missing" }

          # Pre-clean any prior AltTester Player.log under LocalLow so we
          # don't read stale lines. Walk LocalLow and remove every Player.log
          # under a directory whose name mentions AltTester.
          $lowRoot = Join-Path $env:USERPROFILE "AppData\LocalLow"
          if (Test-Path $lowRoot) {
            Get-ChildItem -Path $lowRoot -Recurse -Filter "Player.log" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "AltTester|Altom" } |
              ForEach-Object {
                Write-Host "Pre-clean: removing $($_.FullName)"
                Remove-Item -Force -Path $_.FullName -ErrorAction SilentlyContinue
              }
          }

          $logFile = Join-Path $env:TEMP "alttester-unity.log"
          if (Test-Path $logFile) { Remove-Item $logFile -Force }

          # `-logFile <path>` forces Unity Player to write its log to that
          # path instead of (or in addition to) the default LocalLow location.
          # We still also grab the LocalLow log after the fact as a fallback
          # in case the build ignores -logFile.
          $arglist = @(
            "-batchmode", "-nographics", "-termsAndConditionsAccepted",
            "-port", "13000",
            "-license", $env:ALTTESTER_LICENSE,
            "-logFile", $logFile
          )
          $masked = ($arglist -join ' ') -replace [regex]::Escape($env:ALTTESTER_LICENSE), '<LICENSE>'
          Write-Host "Launching: $exe $masked"
          $proc = Start-Process -FilePath $exe -ArgumentList $arglist -NoNewWindow -PassThru
          Write-Host "Started PID $($proc.Id). Sleeping 60s..."
          Start-Sleep -Seconds 60

          Write-Host "--- proc state ---"
          $live = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if ($live) {
            Write-Host "Still running. HasExited=$($live.HasExited)"
          } else {
            Write-Host "Process is gone. ExitCode=$($proc.ExitCode)"
          }

          Write-Host "--- -logFile target ($logFile) ---"
          if (Test-Path $logFile) {
            Get-Content $logFile
          } else {
            Write-Host "(empty / not created - build may ignore -logFile)"
          }

          Write-Host "--- LocalLow Player.log scan ---"
          if (Test-Path $lowRoot) {
            $found = Get-ChildItem -Path $lowRoot -Recurse -Filter "Player.log" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "AltTester|Altom" }
            if (-not $found) {
              Write-Host "(no AltTester Player.log under $lowRoot)"
            } else {
              foreach ($f in $found) {
                Write-Host "=== $($f.FullName) ==="
                Get-Content $f.FullName
              }
            }
          }

          if ($live) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }

      # ── AltTester loader-hang diagnostic. ──
      # Local probes (2026-05-13) ruled out the obvious causes: the exact same
      # arglist `-batchmode -nographics -termsAndConditionsAccepted -port <p>
      # -license <k> -logFile <path>` starts AltTester Desktop in ~5-11s
      #   - in a user-mode interactive Windows 11 session (10.0.26200), AND
      #   - under LocalSystem in session 0 via PsExec64 -s (no interactive desktop)
      # producing a 5KB Unity log and an open WS server on the requested port.
      # So the hang on this runner is NOT in the flag set, NOT in Window
      # Station / session 0, NOT in GPU (since -nographics gives NullGfxDevice).
      # It is something specific to the partner Win11 Desktop image - most
      # likely Defender / EDR blocking a DLL load, an outbound proxy choking
      # license activation, or a VC++ / loader callback specific to this AMI.
      #
      # This step captures the evidence needed to RCA it:
      #   - Defender state + force-exclude AltTester install dir
      #   - DLL signatures + VC runtime versions inside the AltTester install
      #   - Outbound reachability to alttester.com (license server)
      #   - Procmon trace of all file/registry/network calls during launch
      #   - ProcDump full memory dump of the hung process at t=90s
      #   - Loaded modules snapshot of the hung process
      # All uploaded as artifacts for offline analysis (WinDbg / Procmon GUI).
      - name: Diag - AltTester loader hang capture
        if: inputs.diagnose_alttester == true
        shell: powershell
        timeout-minutes: 10
        env:
          ALTTESTER_LICENSE: ${{ secrets.ALTTESTER_LICENSE }}
        run: |
          $ErrorActionPreference = "Continue"
          $diagDir = Join-Path $env:RUNNER_TEMP "alttester-diag"
          New-Item -ItemType Directory -Path $diagDir -Force | Out-Null
          Write-Host "Diag dir: $diagDir"

          # 1. Sysinternals tools. ProcDump and Procmon ship in SEPARATE zips
          # (the prior attempt used PSTools.zip which has PsExec but not ProcDump).
          # Both are Microsoft-signed. Find files via Get-ChildItem after extract
          # so we're resilient to filename casing and any future zip layout change.
          $tools = Join-Path $env:USERPROFILE "sysinternals"
          New-Item -ItemType Directory -Path $tools -Force | Out-Null
          function Resolve-Tool($dir, $name) {
            $hit = Get-ChildItem -Path $dir -Recurse -File -Filter $name -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($hit) { return $hit.FullName } else { return $null }
          }
          $procdump = Resolve-Tool $tools "procdump64.exe"
          $procmon  = Resolve-Tool $tools "Procmon64.exe"
          if (-not $procdump) {
            Write-Host "Downloading Procdump.zip..."
            $z = Join-Path $env:RUNNER_TEMP "Procdump.zip"
            Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile $z -UseBasicParsing
            Expand-Archive -Path $z -DestinationPath $tools -Force
            $procdump = Resolve-Tool $tools "procdump64.exe"
          }
          if (-not $procmon) {
            Write-Host "Downloading ProcessMonitor.zip..."
            $z = Join-Path $env:RUNNER_TEMP "ProcessMonitor.zip"
            Invoke-WebRequest -Uri "https://download.sysinternals.com/files/ProcessMonitor.zip" -OutFile $z -UseBasicParsing
            Expand-Archive -Path $z -DestinationPath $tools -Force
            $procmon = Resolve-Tool $tools "Procmon64.exe"
          }
          if (-not $procdump) { throw "procdump64.exe not found under $tools after download" }
          if (-not $procmon)  { throw "Procmon64.exe not found under $tools after download" }
          Write-Host "procdump: $procdump"
          Write-Host "procmon:  $procmon"

          # 2. Environment snapshot.
          Write-Host "=== whoami / session ==="
          whoami | Tee-Object -FilePath "$diagDir\whoami.txt"
          ([System.Diagnostics.Process]::GetCurrentProcess()).SessionId | Out-File "$diagDir\sessionid.txt"
          query session 2>&1 | Out-File "$diagDir\query-session.txt"

          Write-Host "=== Defender state ==="
          try { Get-MpComputerStatus | Format-List | Out-File "$diagDir\defender-status.txt" } catch { "Get-MpComputerStatus failed: $_" | Out-File "$diagDir\defender-status.txt" }
          try { Get-MpPreference | Format-List | Out-File "$diagDir\defender-prefs.txt" } catch {}
          try { Get-MpThreatDetection 2>$null | Format-List | Out-File "$diagDir\defender-threats.txt" } catch {}

          Write-Host "=== Force-exclude AltTester from Defender ==="
          try {
            Add-MpPreference -ExclusionPath "C:\Program Files\AltTesterDesktop" -ErrorAction Stop
            Add-MpPreference -ExclusionProcess "AltTesterDesktop.exe" -ErrorAction Stop
            "Exclusions added" | Out-File "$diagDir\defender-exclusion.txt"
          } catch {
            "Add-MpPreference failed: $_" | Out-File "$diagDir\defender-exclusion.txt"
          }

          Write-Host "=== AltTester install signatures ==="
          Get-ChildItem -Path "C:\Program Files\AltTesterDesktop" -Include *.exe,*.dll -Recurse -ErrorAction SilentlyContinue |
            ForEach-Object {
              $sig = Get-AuthenticodeSignature $_.FullName
              [PSCustomObject]@{
                Path   = $_.FullName
                Status = $sig.Status
                Signer = if ($sig.SignerCertificate) { $sig.SignerCertificate.Subject } else { '<unsigned>' }
              }
            } | Format-List | Out-File "$diagDir\at-signatures.txt"

          Write-Host "=== VC runtime DLLs ==="
          $vcrt = @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","ucrtbase.dll")
          foreach ($d in $vcrt) {
            $p = Join-Path "$env:SystemRoot\System32" $d
            if (Test-Path $p) {
              "${d}: $((Get-Item $p).VersionInfo.FileVersion)" | Out-File "$diagDir\vcrt.txt" -Append
            } else {
              "${d}: MISSING" | Out-File "$diagDir\vcrt.txt" -Append
            }
          }

          Write-Host "=== Outbound to alttester.com ==="
          try { Test-NetConnection alttester.com -Port 443 -InformationLevel Detailed 2>&1 | Out-File "$diagDir\netconn-alttester.txt" } catch { "TNC failed: $_" | Out-File "$diagDir\netconn-alttester.txt" }
          try {
            $r = Invoke-WebRequest -Uri "https://alttester.com/" -UseBasicParsing -TimeoutSec 15
            "Status=$($r.StatusCode) Len=$($r.RawContentLength)" | Out-File "$diagDir\http-alttester.txt"
          } catch { "HTTP alttester.com failed: $_" | Out-File "$diagDir\http-alttester.txt" }

          # 3. Start Procmon capture (no UI). Captures everything; we'll filter offline.
          $pml = Join-Path $diagDir "alttester.pml"
          Write-Host "=== Starting Procmon -> $pml ==="
          Start-Process -FilePath $procmon -ArgumentList @("/AcceptEula","/Quiet","/Minimized","/Backingfile",$pml) -WindowStyle Hidden
          Start-Sleep -Seconds 3

          # 4. Launch AltTester with the standard MetaForge arglist.
          $exe = "C:\Program Files\AltTesterDesktop\AltTesterDesktop.exe"
          $logFile = Join-Path $diagDir "alttester-unity.log"
          $arglist = @(
            "-batchmode", "-nographics", "-termsAndConditionsAccepted",
            "-port", "13000",
            "-license", $env:ALTTESTER_LICENSE,
            "-logFile", $logFile
          )
          $masked = ($arglist -join ' ') -replace [regex]::Escape($env:ALTTESTER_LICENSE), '<LICENSE>'
          Write-Host "=== Launching AltTester: $exe $masked ==="
          $atProc = Start-Process -FilePath $exe -ArgumentList $arglist -PassThru -WindowStyle Hidden
          Write-Host "AT PID=$($atProc.Id)"

          # 5. Poll TCP 13000 for ready, up to 90s.
          $ready = $false
          $deadline = (Get-Date).AddSeconds(90)
          while ((Get-Date) -lt $deadline) {
            try {
              $t = New-Object System.Net.Sockets.TcpClient
              $iar = $t.BeginConnect("127.0.0.1", 13000, $null, $null)
              if ($iar.AsyncWaitHandle.WaitOne(500, $false)) { $t.EndConnect($iar); if ($t.Connected) { $ready = $true; break } }
            } catch { } finally { try { $t.Close() } catch {} }
            $alive = Get-Process -Id $atProc.Id -ErrorAction SilentlyContinue
            if (-not $alive) { Write-Host "AT exited early ExitCode=$($atProc.ExitCode)"; break }
            Start-Sleep -Milliseconds 500
          }
          $elapsed = [int]((Get-Date) - $atProc.StartTime).TotalSeconds
          "ready=$ready elapsed=${elapsed}s pid=$($atProc.Id)" | Tee-Object -FilePath "$diagDir\summary.txt"

          # 6. Loaded modules of the (possibly hung) process - snapshot before dump.
          try {
            Get-Process -Id $atProc.Id -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Modules |
              Select-Object ModuleName, FileName, FileVersion, Company |
              Format-Table -AutoSize | Out-File "$diagDir\at-modules.txt"
          } catch { "modules: $_" | Out-File "$diagDir\at-modules.txt" }

          # 7. ProcDump full memory dump - only meaningful if hang reproduced.
          if (-not $ready) {
            $alive = Get-Process -Id $atProc.Id -ErrorAction SilentlyContinue
            if ($alive) {
              Write-Host "=== ProcDump (-ma full) on hung AltTester ==="
              $dumpFile = Join-Path $diagDir "alttester.dmp"
              & $procdump -accepteula -ma $atProc.Id $dumpFile 2>&1 | Out-File "$diagDir\procdump-output.txt"
            } else {
              "AT process exited; no dump." | Out-File "$diagDir\procdump-output.txt"
            }
          } else {
            "AT ready in ${elapsed}s; no hang to dump." | Out-File "$diagDir\procdump-output.txt"
          }

          # 8. Copy Player.log fallbacks (both user and system profile LocalLow).
          foreach ($r in @("$env:USERPROFILE\AppData\LocalLow","C:\Windows\System32\config\systemprofile\AppData\LocalLow")) {
            if (-not (Test-Path $r)) { continue }
            Get-ChildItem -Path $r -Recurse -Filter "Player.log" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "AltTester|Altom" } |
              ForEach-Object {
                $name = "player-$([System.IO.Path]::GetFileName($_.Directory.FullName))-" + ([System.IO.Path]::GetFileNameWithoutExtension($r)) + ".log"
                Copy-Item $_.FullName (Join-Path $diagDir $name) -Force
              }
          }

          # 9. Stop Procmon (flush backing file).
          Write-Host "=== Stopping Procmon ==="
          & $procmon /Terminate 2>&1 | Out-File "$diagDir\procmon-terminate.txt"
          Start-Sleep -Seconds 5

          # 10. Kill AltTester if still alive.
          Get-Process AltTesterDesktop -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          # 11. List artifacts so the job log shows what we captured.
          Write-Host "=== Diag artifacts ==="
          Get-ChildItem $diagDir -Recurse | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host

          # 12. Remove Defender exclusions we added.
          try { Remove-MpPreference -ExclusionPath "C:\Program Files\AltTesterDesktop" -ErrorAction SilentlyContinue } catch {}
          try { Remove-MpPreference -ExclusionProcess "AltTesterDesktop.exe" -ErrorAction SilentlyContinue } catch {}

      # AltTester Desktop smoke proved -batchmode -nographics hangs in Unity init
      # on this runner even with WDDM/T4 working. `mf explorer test` invokes
      # AltTesterService.StartServerAsync with the same flag set
      # (MetaForgeCLI/Services/AltTesterService.cs:18) and waits for the ready
      # line "AltTester(R) Server is running on port 13000". First-run
      # expectation: hang on ready timeout. Cap step at 20 min so the cleanup
      # step still gets to run.
      - name: Run InWorld suite
        if: env.DRY_RUN != 'true' && inputs.diagnose_alttester != true
        timeout-minutes: 20
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"
          mf explorer test $env:BUILD_URL `
            --non-interactive `
            --filter "$env:TEST_FILTER Category=InWorld" `
            --report-type SingleFile `
            --skip-allure-open
          exit $LASTEXITCODE

      - name: Dry-run notice
        if: env.DRY_RUN == 'true'
        shell: powershell
        run: Write-Host "::notice::dry_run=true - skipped mf explorer test. Chassis steps (install, license, account) ran to verify wiring."

      - name: Locate Allure report
        id: report
        if: always() && env.DRY_RUN != 'true'
        shell: powershell
        run: |
          $roots = @(
            (Join-Path $env:LOCALAPPDATA "Decentraland\MetaForge"),
            (Join-Path $env:APPDATA "Decentraland\MetaForge")
          )
          $report = $null
          foreach ($root in $roots) {
            if (-not (Test-Path $root)) { continue }
            $candidate = Get-ChildItem -Path $root -Recurse -Filter "index.html" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*allure-report*" } |
              Select-Object -First 1
            if ($candidate) { $report = $candidate.FullName; break }
          }
          if (-not $report) {
            Write-Host "::warning::Allure report not found; skipping upload."
            "report_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Report at: $report"
            "report_path=$report" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Configure AWS credentials
        if: false  # TEMP: disabled while stabilizing InWorld run. Re-enable once test is green.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_EXPLORER_TEAM_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_EXPLORER_TEAM_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEV_EXPLORER_TEAM_AWS_DEFAULT_REGION }}

      - name: Upload Allure report to S3
        id: s3
        if: false  # TEMP: disabled while stabilizing InWorld run.
        shell: powershell
        env:
          BUCKET: ${{ secrets.DEV_EXPLORER_TEAM_S3_BUCKET }}
          S3_PATH: ${{ steps.ids.outputs.s3_path }}
          REPORT: ${{ steps.report.outputs.report_path }}
        run: |
          $reportDir = Split-Path -Parent $env:REPORT
          aws s3 sync "$reportDir" "s3://$env:BUCKET/$env:S3_PATH/" --acl public-read --cache-control "public, max-age=300"

      - name: Upload logs and report (artifact fallback)
        if: always()  # Re-enabled to diagnose AltTester ready-timeout. S3 upload stays off.
        uses: actions/upload-artifact@v4
        with:
          name: runner-validation-windows-${{ steps.ids.outputs.short_sha }}-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ~/AppData/LocalLow/Decentraland/Explorer/Player.log
            ~/AppData/Local/Temp/Decentraland/Explorer/Crashes/**
            ~/AppData/Local/Decentraland/MetaForge/**/allure-report/**
            ~/AppData/Local/Decentraland/MetaForge/**/allure-results/**
            ~/AppData/Roaming/DecentralandLauncherLight/output.log

      # Separate artifact step for the AltTester diagnostic dir: upload-artifact@v4
      # requires all paths in one step to share a workspace-relative root, and the
      # diag dir lives outside workspace under ${{ runner.temp }} (so it gets
      # cleaned automatically between jobs). Splitting it out lets v4 use the diag
      # dir itself as the rootDirectory.
      - name: Upload AltTester diag artifact
        if: always() && inputs.diagnose_alttester == true
        uses: actions/upload-artifact@v4
        with:
          name: alttester-diag-${{ steps.ids.outputs.short_sha }}-${{ github.run_id }}
          if-no-files-found: warn
          path: ${{ runner.temp }}/alttester-diag/**

      - name: Summarize report URL
        if: false  # TEMP: disabled while stabilizing InWorld run.
        shell: powershell
        run: |
          $url = "${{ steps.ids.outputs.report_url }}"
          "::notice::Allure report: $url" | Write-Host
          "**Allure report:** [$url]($url)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      # ── Cleanup is mandatory on a persistent self-hosted runner. Every step ──
      # ── runs unconditionally (`always()` + per-step error swallow) so a ──
      # ── single failure here doesn't mask another. ──
      #
      # `mf alttester deactivate` invokes AltTesterDesktop.exe in batchmode
      # (a Unity Player build). Empirically it hangs on this runner even
      # with the GRID 572.83 WDDM driver installed - probably because
      # AltTester Desktop is built on an older Unity LTS whose batchmode
      # `-nographics` path doesn't tolerate the headless desktop session.
      # Two-layer guard so a hang here never starves `mf account remove`
      # below (which would leave an orphan test account on every run):
      #   1) Skip outright when nvidia-smi reports anything other than
      #      WDDM - no point even trying without graphics.
      #   2) When attempting, wrap in a 60s background job timeout. If it
      #      completes, the license slot is freed; if it hangs we kill any
      #      lingering AltTesterDesktop.exe and continue.
      - name: Cleanup - stop MetaForge state
        if: always()
        timeout-minutes: 3
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          try { mf explorer server stop --non-interactive } catch { Write-Host "server stop: $_" }

          $driverModel = $null
          try {
            $driverModel = (nvidia-smi --query-gpu=driver_model.current --format=csv,noheader 2>$null | Select-Object -First 1).Trim()
          } catch { }

          if ($driverModel -eq "WDDM") {
            Write-Host "GPU driver model = WDDM; attempting mf alttester deactivate (60s hard timeout)..."
            $job = Start-Job -ScriptBlock { mf alttester deactivate --non-interactive 2>&1 }
            if (Wait-Job $job -Timeout 60) {
              Receive-Job $job | ForEach-Object { Write-Host $_ }
              Write-Host "alttester deactivate completed."
            } else {
              Write-Host "::warning::alttester deactivate timed out (>60s) - AltTesterDesktop.exe likely wedged in Unity init. Killing it and continuing so account remove can run."
              Stop-Job $job -ErrorAction SilentlyContinue
              Get-Process AltTesterDesktop -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            }
            Remove-Job $job -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "::warning::Skipping mf alttester deactivate - GPU driver model='$driverModel' (need WDDM). License slot stays bound to this persistent runner; revisit once GPU is fixed."
          }

          if ($env:MF_ACCOUNT) {
            try { mf account remove $env:MF_ACCOUNT --yes --non-interactive } catch { Write-Host "account remove: $_" }
          }

      - name: Cleanup - kill Explorer / Unity / AltTester
        if: always()
        timeout-minutes: 2
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Get-Process | Where-Object { $_.ProcessName -match "Decentraland|Unity|AltTester" } |
            ForEach-Object {
              Write-Host "Killing $($_.ProcessName) (PID: $($_.Id))"
              Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
            }
