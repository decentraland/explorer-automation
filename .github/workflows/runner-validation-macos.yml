name: Runner Validation (macOS)

# macOS counterpart to runner-validation-windows.yml — runs the InWorld
# NUnit category against the macOS Explorer build on GitHub-hosted
# `macos-14`. Same chassis as run-visual-suite.yml (which has been green
# for weeks), so install steps are well-trodden: dotnet, AltTester .dmg,
# MetaForge, allure, account provisioning, S3 upload.
#
# Why a separate workflow from the Windows version:
#   - macOS install steps (bash / brew / dmg / Homebrew preinstalls) and
#     Windows install steps (PowerShell / Inno Setup / MSI / side-loads)
#     diverge too widely to share usefully.
#   - macos-14 is ephemeral GitHub-hosted; the Windows runner is persistent
#     self-hosted with manual driver pinning. Cleanup/concurrency semantics
#     differ.
#
# Triggers:
#   - workflow_dispatch (manual, with overrides for build_url + test filter)
#   - push on feat/win-gpu-test-runner-workflow if this YAML or
#     explorer/Tests changes (fast iteration during PR review)
#
# Required secrets (mirrors Windows):
#   - ALTTESTER_LICENSE                        AltTester Pro license key
#   - REPOS_READ_ONLY_TOKEN                    PAT — read on decentraland/MetaForge
#   - DEV_EXPLORER_TEAM_S3_BUCKET              S3 bucket for the Allure report
#   - DEV_EXPLORER_TEAM_AWS_DEFAULT_REGION     AWS region the bucket lives in
#   - DEV_EXPLORER_TEAM_AWS_ACCESS_KEY_ID      S3 upload credentials
#   - DEV_EXPLORER_TEAM_AWS_SECRET_ACCESS_KEY  S3 upload credentials
#
# Required vars:
#   - DEV_EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL   Public-facing prefix of the bucket

on:
  workflow_dispatch:
    inputs:
      build_url:
        description: 'Direct URL to a Decentraland_macos.zip. Empty = latest reachable unity-explorer PR build.'
        type: string
        required: false
        # Pinned to unity-explorer PR #8826 (PerfSampler extraction for AltTester reuse,
        # latest build pr-22547-ed80a74). Same pin as the Windows workflow so the perf
        # hook in BaseTest.OneTimeSetUp resolves DCL.PerformanceAndDiagnostics.AutoPilot
        # .PerfSampler on both platforms. Revert to '' to fall back to candidate probing.
        default: 'https://explorer-artifacts.decentraland.org/@dcl/unity-explorer/branch/feat/test-automation/autopilot-alttester/pr-22547-ed80a74/Decentraland_macos.zip'
      test_filter:
        description: 'NUnit --filter expression. Default runs InWorld + Auth categories (Auth fixtures sign out at the end of the run — Order=1000+ keeps them last).'
        type: string
        required: false
        default: 'Category=InWorld|Category=Auth'
      dry_run:
        description: 'Skip mf explorer test invocation (chassis validation only).'
        type: boolean
        required: false
        default: false

  push:
    branches: [feat/win-gpu-test-runner-workflow]
    paths:
      - '.github/workflows/runner-validation-macos.yml'
      - 'explorer/Tests/**'

# macos-14 runners are ephemeral, but serializing keeps concurrent runs on
# the same PR from racing on the S3 path. cancel-in-progress=true is safe
# (no persistent state to clean up like on the Windows self-hosted runner).
concurrency:
  group: runner-validation-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  resolve:
    name: Resolve build URL
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_url: ${{ steps.build.outputs.build_url }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_REF" \
            --state open \
            --json number \
            --jq '.[0].number // ""' 2>/dev/null || echo "")
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_NUMBER" ]; then
            echo "::notice::Resolved PR #${PR_NUMBER} for branch ${HEAD_REF}"
          else
            echo "::notice::No open PR found for branch ${HEAD_REF}; using manual segment in S3 path."
          fi

      - name: Resolve Explorer build URL
        id: build
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
          OVERRIDE: ${{ inputs.build_url }}
          # See runner-validation-windows.yml for why this hard fallback
          # exists. TL;DR: workflow_dispatch.inputs defaults don't apply to
          # push events; without PINNED_DEFAULT the probe loop below picks
          # whatever recent PR is green on Unity Cloud Build, which often
          # doesn't ship PerfSampler.
          PINNED_DEFAULT: 'https://explorer-artifacts.decentraland.org/@dcl/unity-explorer/branch/feat/test-automation/autopilot-alttester/pr-22547-ed80a74/Decentraland_macos.zip'
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "::notice::Using user-supplied build URL."
            echo "build_url=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${PINNED_DEFAULT:-}" ]; then
            echo "::notice::Using pinned default build URL (PR #8826 PerfSampler build)."
            echo "build_url=${PINNED_DEFAULT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Same probe loop as the Windows resolve, just swapping the
          # artifact filename. PR/branch builds are the only ones with the
          # AltTester scripting define enabled (release builds strip it).
          ARTIFACT_BASE="https://explorer-artifacts.decentraland.org/@dcl/unity-explorer/branch"
          CANDIDATES_JSON=$(gh api \
            "repos/decentraland/unity-explorer/actions/workflows/build-unitycloud.yml/runs?event=pull_request&status=success&per_page=20" \
            --jq '[.workflow_runs[] | {head_branch, head_sha, run_number}]')

          BUILD_URL=""
          for i in 0 1 2 3 4; do
            CAND=$(echo "$CANDIDATES_JSON" | jq -r ".[$i]")
            [ "$CAND" = "null" ] && break
            BRANCH=$(echo "$CAND" | jq -r '.head_branch')
            RUN=$(echo "$CAND"   | jq -r '.run_number')
            SHA7=$(echo "$CAND"  | jq -r '.head_sha[0:7]')
            URL="${ARTIFACT_BASE}/${BRANCH}/pr-${RUN}-${SHA7}/Decentraland_macos.zip"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -I "$URL")
            if [ "$HTTP" = "200" ]; then
              BUILD_URL="$URL"
              echo "::notice::Using unity-explorer PR build: branch=${BRANCH} run=${RUN} sha=${SHA7}"
              break
            fi
            echo "::warning::Candidate ${BRANCH}/pr-${RUN}-${SHA7} returned HTTP ${HTTP} — trying next."
          done

          if [ -z "$BUILD_URL" ]; then
            echo "::error::No reachable unity-explorer PR build found in the last 20 successful Unity Cloud Build runs."
            exit 1
          fi

          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"

  run:
    name: Runner validation (InWorld smoke)
    needs: resolve
    runs-on: macos-14
    timeout-minutes: 60

    env:
      BUILD_URL: ${{ needs.resolve.outputs.build_url }}
      TEST_FILTER: ${{ inputs.test_filter || 'FullyQualifiedName~TestOpenSettingsWithShortcut' }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      COMMIT_SHA: ${{ github.sha }}
      PUBLIC_URL_PREFIX: ${{ vars.DEV_EXPLORER_TEAM_S3_BUCKET_PUBLIC_URL }}
      # Temporarily bumped to 'true' (2026-05-21) while diagnosing the
      # SplashScreen.WaitForGone(60) timeout on macos-14 — Debug-level
      # AltTester server logs surface the per-command exchange in Player.log
      # so we can see exactly where bootstrap stalls. Flip back to 'false'
      # once macOS is stable to avoid the ~30 MB/run polling chatter.
      ALT_VERBOSE_LOGS: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Compute identifiers
        id: ids
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          PR_SEGMENT="${PR_NUMBER:-manual-${GITHUB_RUN_ID}}"
          S3_PATH="@dcl/decentraland-explorer-automation/runner-validation-macos/${PR_SEGMENT}/${SHORT_SHA}"
          REPORT_URL="${PUBLIC_URL_PREFIX}/${S3_PATH}/index.html"
          {
            echo "s3_path=${S3_PATH}"
            echo "report_url=${REPORT_URL}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      # Lifted wholesale from run-visual-suite.yml (Mac visual reusable),
      # which has been green for weeks. Installs dotnet 10, AltTester via
      # the .dmg flow, allure via npm.
      - name: Install runtime prerequisites
        run: |
          set -euo pipefail
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          chmod +x /tmp/dotnet-install.sh
          /tmp/dotnet-install.sh --channel 10.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          export PATH="$HOME/.dotnet:$PATH"
          dotnet --version

          ALTTESTER_URL="https://alttester.com/app/uploads/AltTester/desktop/AltTesterDesktopPackageMac__2_3_1.zip"
          curl -fsSL "$ALTTESTER_URL" -o /tmp/alttester.zip
          unzip -q /tmp/alttester.zip -d /tmp/alttester
          ALTTESTER_DMG=$(find /tmp/alttester -maxdepth 4 -name "AltTesterDesktop*.dmg" -type f | head -1)
          [ -n "$ALTTESTER_DMG" ] || { echo "::error::AltTesterDesktop dmg not found in zip"; exit 1; }
          hdiutil attach "$ALTTESTER_DMG" -nobrowse -quiet
          ALTTESTER_APP=$(find /Volumes -maxdepth 3 -name "AltTesterDesktop.app" -type d 2>/dev/null | head -1)
          [ -n "$ALTTESTER_APP" ] || { echo "::error::AltTesterDesktop.app not found under /Volumes"; ls /Volumes; exit 1; }
          cp -R "$ALTTESTER_APP" /Applications/
          MOUNT_POINT=$(dirname "$ALTTESTER_APP")
          hdiutil detach "$MOUNT_POINT" -quiet || true
          xattr -dr com.apple.quarantine /Applications/AltTesterDesktop.app || true
          ls /Applications/AltTesterDesktop.app/Contents/MacOS/AltTesterDesktop

          npm install -g allure --no-fund --no-audit --loglevel=error
          allure --version
          gh --version

      - name: Verify MetaForge access
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing REPOS_READ_ONLY_TOKEN secret"
            exit 1
          fi
          gh api repos/decentraland/MetaForge/releases/latest --jq '.tag_name'

      - name: Install MetaForge
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          yes | /bin/bash -c "$(curl -fsSL https://explorer-artifacts.decentraland.zone/tools/install.sh)"
          echo "$HOME/Library/Application Support/Decentraland/MetaForge/bin" >> "$GITHUB_PATH"

      # ── Apply CI log matrix so InWorld runs get the same verbose logging
      # as the Windows pipeline. macOS LogMatrixStore path differs from
      # Windows (~/Library/Application Support/Decentraland/MetaForge/
      # log-matrix.json instead of %LOCALAPPDATA%).
      - name: Apply CI log matrix
        run: |
          set -euo pipefail
          SRC="$GITHUB_WORKSPACE/explorer/ci/log-matrix.json"
          DST="$HOME/Library/Application Support/Decentraland/MetaForge/log-matrix.json"
          if [ ! -f "$SRC" ]; then
            echo "::error::CI log matrix source missing: $SRC"
            exit 1
          fi
          mkdir -p "$(dirname "$DST")"
          cp "$SRC" "$DST"
          echo "Applied CI log matrix: $SRC -> $DST"

      - name: Configure AltTester license
        env:
          ALTTESTER_LICENSE: ${{ secrets.ALTTESTER_LICENSE }}
        run: |
          set -euo pipefail
          if [ -z "${ALTTESTER_LICENSE:-}" ]; then
            echo "::error::Missing ALTTESTER_LICENSE secret"
            exit 1
          fi
          mf alttester set-license "$ALTTESTER_LICENSE"

      - name: Pre-install Explorer build
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_URL:-}" ]; then
            echo "::error::BUILD_URL is empty (resolve job failed?)"
            exit 1
          fi
          mf explorer install "$BUILD_URL" --non-interactive

      # Same --env coupling as Windows: account/profile must live in the
      # same catalyst env that `mf explorer test` ships via --dclenv,
      # otherwise auth lands in the new-user flow and BaseTest.EnsureInWorld
      # times out on MainMenu.WaitFor.
      - name: Provision metaforge test account
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/Application Support/Decentraland/Explorer"
          ACCOUNT="ci-inworld-${GITHUB_RUN_ID}"
          mf account create "$ACCOUNT" --env org
          mf account login "$ACCOUNT" --env org
          echo "MF_ACCOUNT=${ACCOUNT}" >> "$GITHUB_ENV"

      - name: Clear Explorer Player.log
        run: |
          LOG="$HOME/Library/Logs/Decentraland/Explorer/Player.log"
          if [ -f "$LOG" ]; then rm -f "$LOG" && echo "Cleared $LOG"; fi

      # Start a background `sample(1)` watcher that captures full thread stacks
      # of the Decentraland process at fixed intervals while the test runs.
      # `sample` is built into macOS (/usr/bin/sample), needs no root for
      # processes the runner owns, and works on a fully frozen target — which
      # is exactly what we need to diagnose the post-VOICE_CHAT freeze on
      # macos-14 paravirt: Player.log stops emitting but the process is still
      # alive (AltTester driver can still connect, it just gets no responses).
      # A snapshot taken DURING the freeze tells us which Metal/PInvoke/mutex
      # call the Unity main thread is parked on.
      #
      # Cadence: 30s gives a few samples during the ~6-min bootstrap window
      # without blowing up artifact size (one `sample` run is ~50-300 KB).
      # The loop exits when Decentraland goes away (process killed by cleanup)
      # or after MAX_SAMPLES, whichever comes first.
      - name: Start Decentraland thread sampler (background)
        run: |
          mkdir -p "$HOME/explorer-samples"
          (
            # Wait up to 2 min for Decentraland to appear. mf launches it
            # somewhere inside the "Run InWorld suite" step that follows.
            WAIT_DEADLINE=$(( $(date +%s) + 120 ))
            PID=""
            while [ "$(date +%s)" -lt "$WAIT_DEADLINE" ]; do
              PID=$(pgrep -f "Decentraland.app/Contents/MacOS/Decentraland" 2>/dev/null | head -1 || true)
              if [ -n "$PID" ]; then break; fi
              sleep 2
            done
            if [ -z "$PID" ]; then
              echo "::warning::sampler: Decentraland process never appeared within 2 min — no samples will be captured"
              exit 0
            fi
            echo "::notice::sampler: attaching to Decentraland pid=$PID"

            # Take up to MAX_SAMPLES * 30s = ~10 min of samples. Each call
            # blocks for 5 s (sample duration) which is fine in a background
            # subshell — the test process runs unimpeded.
            MAX_SAMPLES=20
            for i in $(seq 1 $MAX_SAMPLES); do
              # Bail early if the process died (cleanup ran).
              if ! kill -0 "$PID" 2>/dev/null; then
                echo "::notice::sampler: pid=$PID gone after $((i-1)) samples"
                break
              fi
              TS=$(date +%H%M%S)
              OUT="$HOME/explorer-samples/sample-${i}-${TS}.txt"
              # sample <pid> <duration-seconds> -file <path>
              # -mayDie suppresses the warning when the target exits mid-sample.
              /usr/bin/sample "$PID" 5 -file "$OUT" -mayDie >/dev/null 2>&1 || true
              if [ -f "$OUT" ]; then
                SIZE=$(wc -c < "$OUT" | tr -d ' ')
                echo "::notice::sampler: captured #${i} (${SIZE} bytes) -> ${OUT}"
              fi
              sleep 30
            done
          ) &
          SAMPLER_PID=$!
          echo "SAMPLER_PID=${SAMPLER_PID}" >> "$GITHUB_ENV"
          echo "::notice::sampler: background loop started (subshell pid=${SAMPLER_PID})"

      - name: Run InWorld suite
        if: env.DRY_RUN != 'true'
        timeout-minutes: 40
        env:
          GH_TOKEN: ${{ secrets.REPOS_READ_ONLY_TOKEN }}
          # Perf capture disabled (2026-05-22) while diagnosing the macos-14
          # paravirt freeze in EnsureInWorld — the AutoPilot PerfSampler runs
          # a polling loop on the Unity main thread and competes for cycles
          # with the landscape streaming pipeline. Flip back to '1' once the
          # platform is stable; BaseTest already gates on this env var.
          EXPLORER_PERF_RECORD: '0'
          # OtpMailbox (used by Auth/OTP fixtures) reads these via Environment.GetEnvironmentVariable.
          # Non-sensitive entries may live in Variables or Secrets — `vars.X || secrets.X` picks
          # whichever is set; password must be a Secret.
          IMAP_HOST: ${{ vars.IMAP_HOST || secrets.IMAP_HOST }}
          IMAP_PORT: ${{ vars.IMAP_PORT || secrets.IMAP_PORT }}
          IMAP_USER: ${{ vars.IMAP_USER || secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          OTP_FROM_EMAIL: ${{ vars.OTP_FROM_EMAIL || secrets.OTP_FROM_EMAIL }}
          EMAIL_DOMAIN: ${{ vars.EMAIL_DOMAIN || secrets.EMAIL_DOMAIN }}
        run: |
          set -euo pipefail
          # Explorer launch args forwarded via mf v2.12.0+ --app-args:
          #   --landscape-terrain-enabled false : the LandscapePlugin renderer
          #     registration (BushOptimized/Rock/TreeOptimized) is where the
          #     macos-14 paravirt freezes; cutting terrain entirely sidesteps
          #     the GPU stall we saw on PR #12 runs.
          #   --skybox-time-enabled false : mirrors what Visual passes; the
          #     time-of-day skybox simulation isn't load-bearing for InWorld
          #     smoke and saves a bit of paravirt headroom.
          #   --graphics low : on macos-14 this is redundant because
          #     EnforceLowPreset() already fires when MinimumSpecs fails
          #     (which it does on the paravirt GPU/VRAM/RAM), but it makes
          #     the intent explicit and reuses cleanly on Windows T4 (where
          #     specs may pass and the override actually wins).
          #   --skip-minimum-specs-screen : pairs with --graphics so the
          #     EnforceLowPreset path doesn't clobber an explicit higher
          #     preset on adequate hardware; also skips the modal that
          #     BaseTest.DismissMinimumSpecsModalIfPresent polls for.
          # '=' form is mandatory — Spectre.Console parses the space form
          # ("--app-args ...") as a new option starting at --landscape...
          # See MetaForge ExplorerTestSettings.AppArgs description.
          TEST_EXIT=0
          mf explorer test "$BUILD_URL" \
            --non-interactive \
            --filter "$TEST_FILTER" \
            --report-type SingleFile \
            --skip-allure-open \
            --app-args="--landscape-terrain-enabled false --skybox-time-enabled false --graphics low --skip-minimum-specs-screen" \
            || TEST_EXIT=$?
          exit "$TEST_EXIT"

      - name: Locate Allure report
        id: report
        if: always() && env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          REPORT=$(find "$HOME/Library/Application Support/Decentraland/MetaForge" \
                        -name "index.html" -path "*allure-report*" 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "::warning::Allure report not found; skipping upload."
            echo "report_path=" >> "$GITHUB_OUTPUT"
          else
            echo "Report at: $REPORT"
            echo "report_path=${REPORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: always() && steps.report.outputs.report_path != '' && env.DRY_RUN != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_EXPLORER_TEAM_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_EXPLORER_TEAM_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEV_EXPLORER_TEAM_AWS_DEFAULT_REGION }}

      - name: Upload Allure report to S3
        id: s3
        if: always() && steps.report.outputs.report_path != '' && env.DRY_RUN != 'true'
        env:
          BUCKET: ${{ secrets.DEV_EXPLORER_TEAM_S3_BUCKET }}
          S3_PATH: ${{ steps.ids.outputs.s3_path }}
          REPORT: ${{ steps.report.outputs.report_path }}
        run: |
          set -euo pipefail
          REPORT_DIR=$(dirname "$REPORT")
          aws s3 sync "$REPORT_DIR" "s3://$BUCKET/$S3_PATH/" \
            --acl public-read \
            --cache-control "public, max-age=300"

      # Dump the tail of Player.log + AltTester-Server.log directly into the
      # workflow console so failures are diagnosable without downloading the
      # artifact. Kept under `if: failure()` so green runs don't add noise.
      # Last 400 lines is enough to capture the [BOOT NN] sequence + the
      # AltTester command exchange around the WaitForGone timeout.
      - name: Dump Player.log + AltTester-Server.log tail (on failure)
        if: failure()
        run: |
          set +e
          PLAYER="$HOME/Library/Logs/Decentraland/Explorer/Player.log"
          # AltTester-Server.log lives next to Explorer prefs in Application
          # Support, NOT in ~/Library/Logs (where only Unity's Player.log
          # goes). Player.log itself confirms the path:
          #   "AltTester(R) logs are saved at:
          #    ~/Library/Application Support/Decentraland/Explorer/AltTester-Server.log"
          ALT="$HOME/Library/Application Support/Decentraland/Explorer/AltTester-Server.log"
          echo "::group::Player.log (last 400 lines)"
          if [ -f "$PLAYER" ]; then
            tail -n 400 "$PLAYER"
          else
            echo "Player.log not found at $PLAYER"
            echo "Contents of ~/Library/Logs/Decentraland/Explorer/:"
            ls -la "$HOME/Library/Logs/Decentraland/Explorer/" 2>/dev/null || echo "(directory missing)"
          fi
          echo "::endgroup::"
          echo "::group::AltTester-Server.log (last 200 lines)"
          if [ -f "$ALT" ]; then
            tail -n 200 "$ALT"
          else
            echo "AltTester-Server.log not found at $ALT"
          fi
          echo "::endgroup::"

          # Take one last `sample` snapshot of the (probably frozen) Decentraland
          # process for the failure case where the periodic sampler may have
          # already finished its MAX_SAMPLES budget or missed the freeze window.
          # This is best-effort — if the process is already gone (cleanup ran or
          # Player crashed), we just print a notice and move on.
          echo "::group::Decentraland post-mortem sample (10s)"
          PID=$(pgrep -f "Decentraland.app/Contents/MacOS/Decentraland" 2>/dev/null | head -1 || true)
          if [ -n "$PID" ]; then
            mkdir -p "$HOME/explorer-samples"
            POSTMORTEM="$HOME/explorer-samples/sample-postmortem.txt"
            /usr/bin/sample "$PID" 10 -file "$POSTMORTEM" -mayDie 2>&1 || true
            if [ -f "$POSTMORTEM" ]; then
              echo "Saved post-mortem sample to $POSTMORTEM ($(wc -c < "$POSTMORTEM" | tr -d ' ') bytes)"
              echo "--- main-thread excerpt (first 80 lines after Thread 0x0 header) ---"
              awk '/^Thread / { t++ } t==1 { print } t>1 { exit }' "$POSTMORTEM" | head -80
            fi
          else
            echo "Decentraland process no longer running — nothing to sample"
          fi
          echo "::endgroup::"

          # Stop the periodic sampler if it's still going (subshell may be
          # mid-sleep). Failure here is harmless — the job is exiting anyway.
          if [ -n "${SAMPLER_PID:-}" ] && kill -0 "$SAMPLER_PID" 2>/dev/null; then
            kill "$SAMPLER_PID" 2>/dev/null || true
            echo "Stopped background sampler (pid=$SAMPLER_PID)"
          fi

      - name: Upload logs and report (artifact fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-validation-macos-${{ steps.ids.outputs.short_sha }}-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ~/Library/Logs/Decentraland/Explorer/Player.log
            ~/Library/Application Support/Decentraland/Explorer/AltTester-Server.log
            ~/Library/Application Support/Decentraland/MetaForge/**/allure-report/**
            ~/Library/Application Support/Decentraland/MetaForge/**/allure-results/**
            ~/explorer-samples/**

      - name: Summarize report URL
        if: always() && steps.s3.outcome == 'success'
        run: |
          URL="${{ steps.ids.outputs.report_url }}"
          echo "::notice::Allure report: $URL"
          echo "**Allure report:** [$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Find existing PR comment
        if: always() && needs.resolve.outputs.pr_number != ''
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ needs.resolve.outputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## InWorld smoke (macOS)'

      - name: Comment results on PR
        if: always() && needs.resolve.outputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ needs.resolve.outputs.pr_number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## InWorld smoke (macOS)

            ${{ job.status == 'success' && '✅ **InWorld suite passed.**' || '❌ **InWorld suite failed.**' }}

            | | |
            |---|---|
            | Commit | `${{ steps.ids.outputs.short_sha }}` |
            | Branch | `${{ github.ref_name }}` |
            | Filter | `${{ env.TEST_FILTER }}` |
            | Allure report | ${{ steps.s3.outcome == 'success' && format('[Open]({0})', steps.ids.outputs.report_url) || (steps.report.outputs.report_path != '' && '_generated but S3 upload failed — see workflow artifact_' || '_not generated_') }} |
            | Workflow run | [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            <sub>GitHub-hosted `macos-14` · this comment is updated on every run.</sub>

      # macos-14 is ephemeral so cleanup is best-effort; we still release
      # the AltTester license slot and remove the metaforge test account so
      # the activation pool doesn't bloat with dead slots.
      - name: Cleanup metaforge state
        if: always()
        run: |
          mf explorer server stop --non-interactive || true
          mf alttester deactivate --non-interactive || true
          if [ -n "${MF_ACCOUNT:-}" ]; then
            mf account remove "$MF_ACCOUNT" --yes --non-interactive || true
          fi
