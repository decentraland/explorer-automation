name: Web E2E (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Decentraland environment"
        required: true
        type: choice
        default: org
        options:
          - org
          - zone
      suite:
        description: "Which web suite to run"
        required: true
        type: choice
        default: all
        options:
          - all
          - auth
          - download
          - cross

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env from secrets
        # web/helpers/env.ts loads `.env` from the repo root (../../.env from web/helpers/).
        working-directory: ${{ github.workspace }}
        run: |
          cat > .env <<'EOF'
          EXPLORER_IMAP_HOST=${{ secrets.EXPLORER_IMAP_HOST }}
          EXPLORER_IMAP_PORT=${{ secrets.EXPLORER_IMAP_PORT }}
          EXPLORER_IMAP_USER=${{ secrets.EXPLORER_IMAP_USER }}
          EXPLORER_IMAP_PASSWORD=${{ secrets.EXPLORER_IMAP_PASSWORD }}
          EXPLORER_IMAP_FROM_USER=${{ secrets.EXPLORER_IMAP_FROM_USER }}
          EXPLORER_ALTERNATE_EMAILS=${{ secrets.EXPLORER_ALTERNATE_EMAILS }}
          EOF

      - name: Compute Playwright args
        id: args
        run: |
          case "${{ inputs.suite }}" in
            all)      echo "pw=--project=web" ;;
            auth)     echo "pw=--project=web --grep @auth" ;;
            download) echo "pw=--project=web --grep @download" ;;
            cross)    echo "pw=--project=cross" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Run Playwright
        env:
          WEB_BASE_URL: https://decentraland.${{ inputs.environment }}
        run: |
          echo "Running suite=${{ inputs.suite }} against $WEB_BASE_URL"
          npx playwright test ${{ steps.args.outputs.pw }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.suite }}-${{ inputs.environment }}
          path: |
            web/playwright-report/**
            web/test-results/**
            web/allure-results/**
          if-no-files-found: warn
