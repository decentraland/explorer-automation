name: Web E2E (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Decentraland environment"
        required: true
        type: choice
        default: org
        options:
          - org
          - zone
          - today
      suite:
        description: "Which test suite to run"
        required: true
        type: choice
        default: all
        options:
          - all
          - auth
          - landing
          - marketplace
          - marketplace-onchain
          - cross

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    steps:
      - name: Validate environment / suite combination
        # `.today` has no marketplace deployment — the .today dapp reads
        # from `marketplace-api.decentraland.org` (mainnet). Running the
        # marketplace specs against `.today` would mix testnet expectations
        # with mainnet results, so refuse the combination loudly here
        # rather than let the run produce confusing failures.
        if: ${{ inputs.environment == 'today' && (inputs.suite == 'marketplace' || inputs.suite == 'marketplace-onchain') }}
        run: |
          echo "::error::environment=today is not supported with suite=${{ inputs.suite }}."
          echo "::error::Marketplace has no .today deployment (the .today dapp uses prod's marketplace-api)."
          echo "::error::Re-run with environment=org or environment=zone."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          # Fall back to any prior `pw-<os>-…` cache if the lockfile-derived
          # key is a miss (lockfile bumped without changing Playwright). The
          # `playwright install` step still runs to bring in any missing
          # browsers, but starting from a warm cache saves a few minutes.
          restore-keys: |
            pw-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .env from secrets / variables
        # web/shared/helpers/env.ts loads `.env` from the repo root.
        # Marketplace + on-chain secrets are optional — empty values cause
        # the on-chain spec to self-skip via its `haveOnChainConfig` guard.
        #
        # Non-sensitive values (hosts, ports, sender filter, mailbox address,
        # marketplace test-item config) may be configured under repo Settings
        # → Secrets and variables → Actions in either the Secrets *or* the
        # Variables tab — `vars.X || secrets.X` picks whichever is set.
        # Sensitive values (passwords, CF Access tokens, wallet private keys,
        # paid RPC URLs) MUST be in Secrets — don't store those as Variables.
        working-directory: ${{ github.workspace }}
        run: |
          cat > .env <<'EOF'
          IMAP_HOST=${{ vars.IMAP_HOST || secrets.IMAP_HOST }}
          IMAP_PORT=${{ vars.IMAP_PORT || secrets.IMAP_PORT }}
          IMAP_USER=${{ vars.IMAP_USER || secrets.IMAP_USER }}
          IMAP_PASSWORD=${{ secrets.IMAP_PASSWORD }}
          OTP_FROM_EMAIL=${{ vars.OTP_FROM_EMAIL || secrets.OTP_FROM_EMAIL }}
          CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          WALLET_A_PRIVATE_KEY=${{ secrets.WALLET_A_PRIVATE_KEY }}
          WALLET_B_PRIVATE_KEY=${{ secrets.WALLET_B_PRIVATE_KEY }}
          POLYGON_AMOY_RPC_URL=${{ secrets.POLYGON_AMOY_RPC_URL }}
          SEPOLIA_RPC_URL=${{ secrets.SEPOLIA_RPC_URL }}
          MARKETPLACE_TEST_ITEM_CONTRACT=${{ vars.MARKETPLACE_TEST_ITEM_CONTRACT || secrets.MARKETPLACE_TEST_ITEM_CONTRACT }}
          MARKETPLACE_TEST_ITEM_ID=${{ vars.MARKETPLACE_TEST_ITEM_ID || secrets.MARKETPLACE_TEST_ITEM_ID }}
          MARKETPLACE_TEST_ITEM_TYPE=${{ vars.MARKETPLACE_TEST_ITEM_TYPE || secrets.MARKETPLACE_TEST_ITEM_TYPE }}
          MARKETPLACE_TEST_LISTING_PRICE_MANA=${{ vars.MARKETPLACE_TEST_LISTING_PRICE_MANA || secrets.MARKETPLACE_TEST_LISTING_PRICE_MANA }}
          EOF

      - name: Compute Playwright args
        id: args
        run: |
          case "${{ inputs.suite }}" in
            all)                  echo "pw=--project=web" ;;
            auth)                 echo "pw=--project=web --grep @auth" ;;
            landing)              echo "pw=--project=web --grep @landing" ;;
            marketplace)          echo "pw=--project=marketplace" ;;
            marketplace-onchain)  echo "pw=--project=marketplace-onchain" ;;
            cross)                echo "pw=--project=cross" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Run Playwright
        env:
          # `WEB_BASE_URL` drives the auth/landing suite (`getBaseUrl()`),
          # `BASE_URL` drives the marketplace suite (its own playwright.config
          # block). Setting both keeps every project pointed at the same env.
          # `MARKETPLACE_ENV=dev` forces testnets (Polygon Amoy / Sepolia) for
          # the on-chain bucket regardless of the dapp host.
          WEB_BASE_URL: https://decentraland.${{ inputs.environment }}
          BASE_URL: https://decentraland.${{ inputs.environment }}
          MARKETPLACE_ENV: ${{ inputs.suite == 'marketplace-onchain' && 'dev' || '' }}
        run: |
          echo "Running suite=${{ inputs.suite }} against $WEB_BASE_URL"
          npx playwright test ${{ steps.args.outputs.pw }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.suite }}-${{ inputs.environment }}
          path: |
            web/playwright-report/**
            web/test-results/**
            web/allure-results/**
          if-no-files-found: warn
